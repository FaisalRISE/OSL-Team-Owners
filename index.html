<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odyssey Sports League — Player Auction</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --navy:#0d1b4b; --navy2:#13245e; --navy3:#1a2d6e;
    --bg:#070b1a; --surface:#0e1730; --card:#142042; --card2:#1a2952;
    --gold:#e8c050; --gold2:#c8a030; --goldDk:#8a6a1f;
    --line:#243260; --line2:#33457a;
    --text:#eef2fb; --muted:#9fb0d4; --dim:#6b7ca6;
    --green:#34d399; --greenDk:#059669;
    --red:#fb7185; --redDk:#e11d48;
    --teal:#2dd4bf; --pink:#f472b6; --blue:#60a5fa; --purple:#c084fc; --orange:#fb923c; --orangeDk:#ea580c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background:
    radial-gradient(ellipse at 20% 0%, #16235522 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, #1a2d6e22 0%, transparent 50%);
    pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;max-width:1320px;margin:0 auto;padding:0 16px 60px}

  header{position:sticky;top:0;z-index:50;background:rgba(7,11,26,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .hdr{max-width:1320px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--gold),var(--goldDk));display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;box-shadow:0 4px 16px #c8a03044}
  .brand h1{font-family:'Cinzel',serif;font-size:20px;font-weight:900;letter-spacing:1px;line-height:1}
  .brand p{font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-top:3px;font-weight:600}
  .nav{display:flex;gap:4px;background:var(--surface);padding:4px;border-radius:12px;border:1px solid var(--line);flex-wrap:wrap}
  .nav button{padding:8px 14px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-weight:600;font-size:15px;border-radius:8px;cursor:pointer;transition:.15s;white-space:nowrap}
  .nav button.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1300}
  .nav button:hover:not(.active){color:var(--text)}

  h2.sec{font-family:'Cinzel',serif;font-size:24px;font-weight:700;margin:20px 0 4px;letter-spacing:.5px}
  .subtle{color:var(--dim);font-size:15px;margin-bottom:18px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border:none;border-radius:10px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:.15s}
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1300}
  .btn-gold:hover{filter:brightness(1.08)}
  .btn-ghost{background:var(--card);color:var(--muted);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--line2);color:var(--text)}
  .btn-green{background:linear-gradient(135deg,var(--green),var(--greenDk));color:#04231a}
  .btn-red{background:var(--card);color:var(--red);border:1px solid #5a2440}
  .btn-red:hover{background:#2a1424}
  .btn-blue{background:linear-gradient(135deg,var(--blue),#2563eb);color:#031634}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-sm{padding:6px 12px;font-size:14px;border-radius:8px}
  .btn-xs{padding:4px 9px;font-size:13px;border-radius:7px}
  input,select{font-family:inherit;background:var(--card);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:9px 12px;font-size:15px;outline:none;width:100%}
  input:focus,select:focus{border-color:var(--gold2)}
  label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-weight:700;display:block;margin-bottom:5px}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;background:#ffffff10;color:var(--muted);white-space:nowrap}

  .sp-Pickleball{background:#34d39922;color:#34d399}
  .sp-Badminton{background:#60a5fa22;color:#60a5fa}
  .sp-TableTennis{background:#f472b622;color:#f472b6}
  .sp-Carom{background:#fb923c22;color:#fb923c}
  .sp-Bowling{background:#c084fc22;color:#c084fc}
  .sp-Throwball{background:#2dd4bf22;color:#2dd4bf}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px}
  .grid{display:grid;gap:12px}

  .stage{display:grid;grid-template-columns:1fr 400px;gap:16px;margin-top:16px}
  @media(max-width:920px){.stage{grid-template-columns:1fr}}

  .player-card{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line2);border-radius:22px;padding:16px 20px;position:relative;overflow:hidden;display:flex;flex-direction:column}
  .player-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,#c8a03018,transparent 70%)}
  .pc-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:2}
  .pc-cat{font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border-radius:20px}
  .pc-num{font-size:15px;color:var(--dim);font-weight:600}
  .pc-avatar{width:88px;height:88px;border-radius:50%;margin:14px auto 12px;background:linear-gradient(135deg,var(--gold),var(--goldDk));display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:800;color:#1a1300;position:relative;z-index:2;box-shadow:0 8px 30px #c8a03033}
  .pc-name{font-family:'Cinzel',serif;font-size:30px;font-weight:900;text-align:center;position:relative;z-index:2;line-height:1.1}
  .pc-gender{text-align:center;color:var(--muted);font-size:15px;margin-top:6px;position:relative;z-index:2;font-weight:500}
  .pc-sports{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:14px 0;position:relative;z-index:2}
  .pc-sports .chip{font-size:14px;padding:6px 12px}
  .skillbars{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin:6px auto 12px;max-width:440px}
  .skillrow{display:flex;align-items:center;gap:7px;font-size:13px}
  .skillrow .sn{color:var(--muted);width:64px;flex-shrink:0}
  .skilltrack{flex:1;height:6px;background:#ffffff12;border-radius:3px;overflow:hidden}
  .skilltrack i{display:block;height:100%;border-radius:3px}
  .skillrow .sv{width:14px;text-align:right;font-weight:700;color:var(--gold)}

  .bidbox{position:relative;z-index:2;margin-top:auto;text-align:center;background:#070b1a66;border:1px solid var(--line2);border-radius:18px;padding:16px}
  .bid-lbl{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:800}
  .bid-amt{font-family:'Cinzel',serif;font-size:44px;font-weight:900;color:var(--gold);line-height:1;margin:6px 0;text-shadow:0 2px 20px #c8a03044}
  .bid-team{font-size:16px;font-weight:700;min-height:20px}
  .bid-controls{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
  .custombid{display:flex;gap:6px;justify-content:center;margin-top:10px;align-items:center}
  .custombid input{width:120px;text-align:center}

  .empty-stage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:380px;color:var(--dim);text-align:center;gap:14px}
  .empty-stage .big{font-size:64px;opacity:.3}

  .teams-side{display:grid;grid-template-columns:1fr 1fr;gap:7px;max-height:none;overflow:visible}
  .team-bid{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:7px 11px;cursor:pointer;transition:.12s;position:relative;overflow:hidden}
  .team-bid:hover{border-color:var(--gold2);transform:translateX(-2px)}
  .team-bid.leading{border-color:var(--gold);background:#c8a03012}
  .team-bid.cant{opacity:.4;cursor:not-allowed}
  .team-bid.cant:hover{transform:none;border-color:var(--line)}
  .tb-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .tb-name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px}
  .tb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .tb-purse{font-size:15px;font-weight:700;color:var(--green)}
  .tb-meta{display:flex;justify-content:space-between;margin-top:5px;font-size:12px;color:var(--dim)}
  .tb-bar{height:4px;border-radius:2px;background:#ffffff12;margin-top:6px;overflow:hidden}
  .tb-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--teal))}
  .tb-reason{font-size:11px;color:var(--red);margin-top:4px;font-weight:600}

  .qbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 14px}
  .qbar .lbl{font-size:13px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1px}
  .seg{display:flex;gap:3px;background:var(--card);padding:3px;border-radius:9px;flex-wrap:wrap}
  .seg button{padding:6px 11px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-weight:600;font-size:13px;border-radius:7px;cursor:pointer}
  .seg button.on{background:var(--navy3);color:var(--gold)}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-weight:700;padding:11px 12px;border-bottom:1px solid var(--line);background:var(--surface)}
  td{padding:9px 12px;border-bottom:1px solid var(--line);font-size:15px}
  tr:hover td{background:#ffffff05}
  .tbl-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;overflow-x:auto}

  .status{font-size:12px;font-weight:800;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
  .st-sold{background:#34d39922;color:#34d399}
  .st-unsold{background:#fb718522;color:#fb7185}
  .st-pool{background:#60a5fa22;color:#60a5fa}

  .modal-bg{position:fixed;inset:0;background:rgba(3,6,15,.82);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{background:var(--surface);border:1px solid var(--line2);border-radius:20px;max-width:560px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 30px 90px #000a}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:2}
  .modal-h h3{font-family:'Cinzel',serif;font-size:20px;font-weight:700}
  .modal-b{padding:22px}
  .x{background:none;border:none;color:var(--dim);font-size:26px;cursor:pointer;line-height:1}

  .sold-overlay{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(3,6,15,.92);backdrop-filter:blur(10px);animation:fadeIn .3s}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .sold-card{text-align:center;animation:pop .5s cubic-bezier(.18,.89,.32,1.28)}
  @keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .sold-stamp{font-family:'Cinzel',serif;font-size:84px;font-weight:900;color:var(--green);text-shadow:0 4px 40px #34d39966;letter-spacing:4px;transform:rotate(-6deg)}
  .sold-stamp.unsold{color:var(--red);text-shadow:0 4px 40px #fb718566}
  .sold-info{font-size:28px;font-weight:800;margin-top:10px}
  .sold-sub{font-size:22px;color:var(--gold);font-weight:700;margin-top:6px}
  .sold-team{font-size:19px;color:var(--muted);margin-top:14px}
  .confetti{position:fixed;width:10px;height:10px;z-index:299;top:-10px}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:14px 0}
  .toolbar .grow{flex:1;min-width:160px}
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:14px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px}
  .stat .v{font-size:25px;font-weight:800}
  .stat .l{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-weight:700;margin-top:2px}

  .team-setup{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;position:relative}
  .dotrow{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .color-dot{width:24px;height:24px;border-radius:7px;cursor:pointer;border:2px solid transparent}
  .color-dot.sel{border-color:#fff}

  .roster-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--card2);border-radius:8px;font-size:14px;margin:3px}
  .roster-pill .price{color:var(--gold);font-weight:700}

  .hint{font-size:13px;color:var(--dim);background:#60a5fa0a;border:1px solid #60a5fa22;border-radius:9px;padding:9px 12px;margin:10px 0;line-height:1.5}

  .reqgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin-top:8px}
  .reqcell{background:var(--surface);border-radius:8px;padding:7px;text-align:center;font-size:12px}
  .reqcell .rc-v{font-size:16px;font-weight:800}
  .reqcell.full .rc-v{color:var(--green)}
  .reqcell.over .rc-v{color:var(--red)}

  /* PRESENTER MODE */
  .presenter{position:fixed;inset:0;z-index:500;background:radial-gradient(ellipse at 50% 20%,#13245e,#04060f 70%);display:flex;flex-direction:column;overflow:hidden}
  .presenter::after{content:'';position:absolute;inset:0;background:
    radial-gradient(1px 1px at 10% 20%,#fff8,transparent),radial-gradient(1px 1px at 80% 15%,#fff6,transparent),
    radial-gradient(1px 1px at 40% 70%,#fff5,transparent),radial-gradient(2px 2px at 65% 40%,#fff9,transparent),
    radial-gradient(1px 1px at 25% 85%,#fff6,transparent),radial-gradient(1px 1px at 90% 80%,#fff5,transparent);pointer-events:none}
  .pres-head{display:flex;justify-content:space-between;align-items:center;padding:20px 36px;position:relative;z-index:2}
  .pres-logo{display:flex;align-items:center;gap:14px}
  .pres-logo .lg{width:52px;height:52px;border-radius:13px;background:linear-gradient(135deg,var(--gold),var(--goldDk));display:flex;align-items:center;justify-content:center;font-size:30px}
  .pres-logo h1{font-family:'Cinzel',serif;font-size:26px;font-weight:900;letter-spacing:2px}
  .pres-logo p{font-size:13px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;font-weight:600}
  .pres-exit{background:#ffffff15;border:1px solid #ffffff33;color:#fff;padding:10px 18px;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600;font-size:15px}
  .pres-body{flex:1;display:grid;grid-template-columns:1fr 420px;gap:30px;padding:10px 36px 30px;position:relative;z-index:2;overflow:hidden}
  @media(max-width:1000px){.pres-body{grid-template-columns:1fr}}
  .pres-player{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .pres-avatar{width:160px;height:160px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--goldDk));display:flex;align-items:center;justify-content:center;font-size:74px;font-weight:900;color:#1a1300;box-shadow:0 12px 60px #c8a03055;margin-bottom:22px}
  .pres-cat{font-size:17px;font-weight:800;letter-spacing:3px;text-transform:uppercase;padding:8px 22px;border-radius:30px;margin-bottom:16px}
  .pres-name{font-family:'Cinzel',serif;font-size:60px;font-weight:900;line-height:1;margin-bottom:10px}
  .pres-gender{font-size:20px;color:var(--muted);margin-bottom:18px}
  .pres-sports{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:26px}
  .pres-sports .chip{font-size:18px;padding:9px 18px}
  .pres-bid{text-align:center}
  .pres-bid-lbl{font-size:18px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:800}
  .pres-bid-amt{font-family:'Cinzel',serif;font-size:96px;font-weight:900;color:var(--gold);line-height:1;margin:8px 0;text-shadow:0 4px 50px #c8a03066}
  .pres-bid-team{font-size:28px;font-weight:800;min-height:34px}
  .pres-teams{display:flex;flex-direction:column;gap:10px;overflow:auto}
  .pres-team{background:#ffffff0a;border:1px solid #ffffff1a;border-radius:14px;padding:14px 18px}
  .pres-team.leading{border-color:var(--gold);background:#c8a03018}
  .pt-top{display:flex;justify-content:space-between;align-items:center}
  .pt-name{font-size:20px;font-weight:800;display:flex;align-items:center;gap:10px}
  .pt-dot{width:14px;height:14px;border-radius:50%}
  .pt-purse{font-size:20px;font-weight:800;color:var(--green)}
  .pt-meta{font-size:14px;color:var(--muted);margin-top:4px}
  .pres-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#ffffff44;gap:18px;text-align:center}
  .pres-empty .big{font-size:120px}

  /* PRESENTER FLASH */
  .pres-flash{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;pointer-events:none;animation:flashIn 1.4s ease-out forwards}
  .pres-flash span{font-family:'Cinzel',serif;font-size:120px;font-weight:900;letter-spacing:6px;text-shadow:0 6px 60px currentColor;transform:rotate(-7deg)}
  @keyframes flashIn{0%{opacity:0;transform:scale(.4)}15%{opacity:1;transform:scale(1.05)}30%{transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(1.1)}}

  /* PRINT AREA */
  #printArea{display:none}
  @media print{
    body.printing>*:not(#printArea){display:none!important}
    body.printing #printArea{display:block!important}
    #printArea{color:#000;font-family:Arial,sans-serif;padding:0}
    .pa-team{page-break-inside:auto;margin-bottom:18px;border:1px solid #ccc;border-radius:8px;padding:12px}
    .pa-h{font-size:22px;font-weight:800;border-bottom:2px solid #c8a030;padding-bottom:6px;margin-bottom:10px}
    .pa-team h3{font-size:17px;margin-bottom:6px}
    .pa-table{width:100%;border-collapse:collapse;margin-top:6px}
    .pa-table th,.pa-table td{border:1px solid #ddd;padding:5px 8px;font-size:14px;text-align:left}
    .pa-table th{background:#0d1b4b;color:#fff}
  }
  @media print{header,.nav,.no-print{display:none!important}}
@keyframes matchPulse{0%,100%{transform:scale(1);opacity:.85;box-shadow:0 0 0 rgba(251,146,60,.4)}50%{transform:scale(1.04);opacity:1;box-shadow:0 0 30px rgba(251,146,60,.6)}}

  /* ── Mobile / small-screen tuning (helps the Wix embed on phones) ── */
  @media(max-width:600px){
    .wrap{padding:0 10px 48px}
    .hdr{padding:9px 10px;gap:8px}
    .brand{gap:9px}
    .brand h1{font-size:16px;letter-spacing:.5px}
    .brand p{font-size:9px;letter-spacing:1.5px;margin-top:2px}
    .logo{width:34px;height:34px;font-size:19px;border-radius:9px}
    /* nav becomes a single swipeable row instead of stacking 3+ rows tall */
    .nav{gap:3px;padding:3px;width:100%;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .nav::-webkit-scrollbar{height:0}
    .nav button{padding:7px 11px;font-size:13px}
    h2.sec{font-size:19px;margin:14px 0 4px}
    .subtle{font-size:13px;margin-bottom:12px}
    .btn{padding:9px 14px;font-size:14px}
    .btn-sm{padding:6px 11px;font-size:13px}
    /* 16px inputs stop iOS Safari from auto-zooming the page on focus */
    input,select,textarea{font-size:16px}
    .card{border-radius:13px}
    .stage{gap:12px;margin-top:12px}
    .player-card{padding:12px;border-radius:16px}
    .pc-avatar{width:66px;height:66px;font-size:28px;margin:10px auto 8px}
    .pc-name{font-size:22px}
    .bid-amt{font-size:34px}
    table{font-size:13px}
    th{padding:8px 9px}
    td{padding:7px 9px;font-size:13px}
    .seg button{padding:6px 9px;font-size:12px}
    .modal{border-radius:15px}
  }
</style>
</head>
<body>
<header>
  <div class="hdr">
    <div class="brand">
      <div class="logo">🏆</div>
      <div><h1>ODYSSEY PLANNER</h1><p>BNI Odyssey · Team Owner Planner</p></div>
    </div>
    <nav class="nav">
      <button data-tab="home">🏠 Auctions</button>
      <button data-tab="auction" class="active">🔨 Auction</button>
      <button data-tab="players">👥 Players</button>

function migrateState(s){

      base:(s.catBase&&s.catBase[c.id])??c.base,

      if(!p) return;
      const rule=t[rn]||expectedRuleFor(p);
      if(rule==="mq"){
        const sold=S.players.filter(x=>x.status==="sold"&&x.cat===p.cat&&x.price>0&&!x.isOwner);
        p.price = sold.length ? Math.round(sold.reduce((s,x)=>s+x.price,0)/sold.length) : baseFor(p);
      }
    });
  });
}

let TIMER={remaining:0,running:false,iv:null,once:false,twice:false};
function speak(text){ try{ if(!window.speechSynthesis)return; const u=new SpeechSynthesisUtterance(text); u.rate=0.95; u.pitch=1; u.volume=1; speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }
let AC=null;
function beep(freq=660,dur=0.18,type="sine"){ try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)(); const o=AC.createOscillator(),g=AC.createGain(); o.type=type; o.frequency.value=freq; o.connect(g); g.connect(AC.destination); g.gain.setValueAtTime(0.25,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur); o.start(); o.stop(AC.currentTime+dur);}catch(e){} }
function startTimer(){
  stopTimer();

}
function resetTimer(){ if(!S.cfg.timerEnabled)return; TIMER.remaining=S.cfg.timerDuration; TIMER.once=false; TIMER.twice=false; TIMER.running=true; if(!TIMER.iv)TIMER.iv=setInterval(tickTimer,1000); updateTimerUI(); }
function stopTimer(){ TIMER.running=false; if(TIMER.iv){clearInterval(TIMER.iv);TIMER.iv=null;} }
function pauseResumeTimer(){ if(TIMER.running){TIMER.running=false;} else {TIMER.running=true;} updateTimerUI(); }
function tickTimer(){
  if(!TIMER.running) return;
  TIMER.remaining--;
  if(TIMER.remaining===10 && !TIMER.once){ TIMER.once=true; speak("Going once"); beep(740,0.15); flashPresenter("GOING ONCE","#fb923c"); }
  if(TIMER.remaining===5 && !TIMER.twice){ TIMER.twice=true; speak("Going twice"); beep(880,0.15); flashPresenter("GOING TWICE","#fb7185"); }
  if(TIMER.remaining<=0){ TIMER.remaining=0; TIMER.running=false; clearInterval(TIMER.iv); TIMER.iv=null; speak("Final call"); beep(330,0.5,"square"); flashPresenter("FINAL CALL","#e8c050"); }
  updateTimerUI();
}
function flashPresenter(text,color){

}

/* Reserve a team must keep to satisfy unfilled category minimums + remaining min-squad slots.
   Excludes the category currently being bid on (since this player would help fill it). */
function reserveNeeded(tid,excludeCat){
  let reserve=0, mandatoryCount=0;
  cats().forEach(c=>{
    let need=Math.max(0,(c.min||0)-teamCatCount(tid,c.id));
    if(c.id===excludeCat) need=Math.max(0,need-1); // this player fills one
    reserve += need*c.base;
    mandatoryCount += need;
  });
  // any additional slots to reach minSquad (beyond category minimums) at cheapest base
  const roster=teamRoster(tid).length;
  const afterThis=roster+1;
  const extraSlots=Math.max(0, S.cfg.minSquad - afterThis - mandatoryCount);
  if(extraSlots>0){
    const openCats=cats().filter(c=>teamCatCount(tid,c.id)<(c.limit??99));
    const minBase=openCats.length?Math.min(...openCats.map(c=>c.base)):0;
    reserve += extraSlots*minBase;
  }
  return reserve;
}
/* Can a team bid on this player at amount? returns {ok, reason} */
function canTeamBid(tid,p,amount){
  const capC=catById(p.cat);
  if((capC.maxBid||0)>0 && amount>capC.maxBid) return {ok:false,reason:"Max bid "+moneyShort(capC.maxBid)+" reached"};
  const left=teamPurseLeft(tid);
  const roster=teamRoster(tid).length;
  // HARD RULE: never exceed remaining purse
  if(amount>left) return {ok:false,reason:"Exceeds purse ("+moneyShort(left)+")"};
  // max squad
  if(roster>=S.cfg.maxSquad) return {ok:false,reason:"Squad full ("+S.cfg.maxSquad+")"};
  // PARITY: a team that has reached min squad can't bid again until ALL teams reach min
  if(S.cfg.minParity && roster>=S.cfg.minSquad){
    const allAtMin=S.teams.every(t=>teamRoster(t.id).length>=S.cfg.minSquad);
    if(!allAtMin) return {ok:false,reason:"At min "+S.cfg.minSquad+" — others must reach min first"};
  }
  // CATEGORY PARITY: reached this category's minimum → wait until all teams reach this category's min
  const catObj=catById(p.cat);
  if(S.cfg.minParity && (catObj.min||0)>0 && teamCatCount(tid,p.cat)>=catObj.min){
    const allCatMin=S.teams.every(t=>teamCatCount(t.id,p.cat)>=catObj.min);
    if(!allCatMin) return {ok:false,reason:catObj.short+" min done — others must reach "+catObj.short+" min first"};
  }
  // category limit
  const lim=catById(p.cat).limit??99;
  if(teamCatCount(tid,p.cat)>=lim) return {ok:false,reason:catById(p.cat).short+" limit ("+lim+")"};
  // RESERVE: keep enough for unfilled category minimums + remaining squad slots
  const reserve=reserveNeeded(tid,p.cat);
  if(left < amount+reserve) return {ok:false,reason:"Reserve "+moneyShort(reserve)+" for required slots"};
  return {ok:true};
}

function addTeam(){
  const n=S.teams.length+1;
  let id="t"+n; let k=n;
  while(S.teams.some(t=>t.id===id)){k++;id="t"+k;}
  S.teams.push({id, name:"Team "+k, owner1:"", owner2:"", color:TEAM_COLORS[(k-1)%TEAM_COLORS.length], purse:S.cfg.purse, logo:""});
  save(); render(); toast("Team added — set its name, owners & colour");
}
function removeTeam(tid){
  const t=team(tid); if(!t) return;
  if(S.teams.length<=2){toast("At least 2 teams are required");return;}
  const roster=teamRoster(tid);
  const msg=roster.length
    ? `Remove ${t.name}? Its ${roster.length} player(s) will be RELEASED back into the pool (their purchase amounts are undone) and the team is deleted. This cannot be undone.`
    : `Remove ${t.name} from the auction? This cannot be undone.`;
  confirmModal(msg, ()=>{
    // release players
    S.players.forEach(p=>{ if(p.teamId===tid){ p.status="pool"; p.teamId=null; p.price=0; p.isOwner=false; p.secondPass=false; } });
    // clean live bid state
    if(S.current){ if(S.current.leadTeam===tid){S.current.leadTeam=null;S.current.bid=baseFor(player(S.current.playerId));S.current.history=[];S.current.matcher=null;} if(S.current.matcher===tid)S.current.matcher=null; if(S.current.history)S.current.history=S.current.history.filter(x=>x.leadTeam!==tid&&x.matcher!==tid); }
    S.teams=S.teams.filter(x=>x.id!==tid);
    save(); render(); toast(t.name+" removed — players released to pool");
  });
}

/* template download for imports */
function downloadTemplate(){
  const headers=["Name","Gender","Category",...sportsOn()];
  const example=["Example Player","M",cats()[0].name,...sportsOn().map(()=>3)];
  const example2=["Another Player","F",(cats().find(c=>/women/i.test(c.name))||cats()[cats().length-1]).name,...sportsOn().map(()=>2)];
  if(typeof XLSX!=="undefined"){
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet([headers,example,example2]);
    XLSX.utils.book_append_sheet(wb,ws,"Players");
    const ref=[["Category","Base Price","Min/Team","Max/Team"],...cats().map(c=>[c.name,c.base,c.min||0,c.limit])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ref),"Categories (reference)");
    XLSX.writeFile(wb,"OSL_Import_Template.xlsx");
  } else {
    const rows=[headers,example,example2];
    const csv=rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="OSL_Import_Template.csv";a.click();URL.revokeObjectURL(url);
  }
  toast("Template downloaded");
}

  <div class="card" style="padding:18px;max-width:640px;margin-bottom:16px">
    <div style="font-weight:700;margin-bottom:12px">Squad Rules</div>
    <div class="grid" style="grid-template-columns:1fr 1fr 1fr">
      <div><label>Default Purse</label><input type="text" inputmode="numeric" class="moneyInput" id="cfgPurse" value="${fmtIN(S.cfg.purse)}"/></div>
      <div><label>Default Increment</label><input type="text" inputmode="numeric" class="moneyInput" id="cfgInc" value="${fmtIN(S.cfg.defaultInc)}"/></div>
      <div><label>Min Squad</label><input type="number" id="cfgMin" value="${S.cfg.minSquad}"/></div>
      <div><label>Max Squad</label><input type="number" id="cfgMax" value="${S.cfg.maxSquad}"/></div>
      <div><label>Min Male / Team</label><input type="number" id="cfgMinM" value="${S.cfg.minMale}"/></div>
      <div><label>Min Female / Team</label><input type="number" id="cfgMinF" value="${S.cfg.minFemale}"/></div>
    </div>
    <div style="display:flex;gap:14px;align-items:flex-end;margin-top:12px;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:15px;color:var(--text)">
        <input type="checkbox" id="cfgTimer" ${S.cfg.timerEnabled?"checked":""} style="width:auto"/> Enable Bid Timer (with "going once/twice" voice)
      </label>
      <div style="max-width:160px"><label>Timer Seconds</label><input type="number" id="cfgTimerDur" value="${S.cfg.timerDuration}"/></div>
    </div>
    
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:15px;color:var(--text);margin-top:12px">
      <input type="checkbox" id="cfgParity" ${S.cfg.minParity?"checked":""} style="width:auto"/> Min-squad parity — a team at min squad can't bid again until <b style="margin:0 3px">all</b> teams reach min
    </label>
    <button class="btn btn-gold" id="saveCfg" style="margin-top:14px">Save Squad Rules</button>
    ${(()=>{
      const sumMin=cats().reduce((s,c)=>s+(c.min||0),0);
      const fMin=cats().filter(c=>catGender(c)==="F").reduce((s,c)=>s+(c.min||0),0);
      const mMin=cats().filter(c=>catGender(c)==="M").reduce((s,c)=>s+(c.min||0),0);
      const notes=[];
      if(sumMin>S.cfg.maxSquad)notes.push(`<span style="color:var(--red)">⚠ Category minimums total ${sumMin} &gt; max squad ${S.cfg.maxSquad}.</span>`);
      else if(sumMin>S.cfg.minSquad)notes.push(`<span style="color:var(--orange)">Category minimums total ${sumMin} (&gt; min squad ${S.cfg.minSquad}) — each team will need ${sumMin}.</span>`);
      else notes.push(`<span style="color:var(--dim)">Category minimums total ${sumMin} of ${S.cfg.minSquad} min squad.</span>`);
      if(S.cfg.minFemale>0&&fMin<S.cfg.minFemale)notes.push(`<span style="color:var(--orange)">⚠ Women category mins total ${fMin} &lt; min female ${S.cfg.minFemale}.</span>`);
      if(S.cfg.minMale>0&&mMin<S.cfg.minMale)notes.push(`<span style="color:var(--orange)">⚠ Men category mins total ${mMin} &lt; min male ${S.cfg.minMale}.</span>`);
      return `<div style="font-size:13px;margin-top:10px;line-height:1.6">${notes.join("<br>")}</div>`;
    })()}
  </div>

  <div class="card" style="padding:18px;max-width:1120px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-weight:700">Categories — rename, recolour, price, increment, min/max per team</div>
      <button class="btn btn-gold btn-sm" id="addCat">+ Add Category</button>
    </div>
    <div style="overflow-x:auto">
    <div style="display:grid;grid-template-columns:180px 110px 100px 100px 100px 100px 64px 64px 130px 34px;gap:7px;align-items:center;font-size:12px;color:var(--dim);text-transform:uppercase;font-weight:700;margin-bottom:6px;min-width:1030px">
      <span>Name</span><span>Base ₹</span><span>Increment ₹</span><span>Match ₹</span><span>Max Bid ₹</span><span>Unsold ₹</span><span>Min/Team</span><span>Max/Team</span><span>Owner ₹</span><span></span>
    </div>
    ${cats().map(c=>{
      const T=S.teams.length;
      const total=S.players.filter(p=>p.cat===c.id).length;
      const cap=T*c.limit, need=T*(c.min||0);
      const over=total>cap, under=total<need;
      const note=over?`<span style="color:var(--red)">⚠ ${total-cap} over capacity</span>`
        :under?`<span style="color:var(--red)">⚠ ${need-total} short of required minimum</span>`
        :total<cap?`<span style="color:var(--orange)">${cap-total} below full capacity</span>`
        :`<span style="color:var(--green)">✓ fits</span>`;
      return `<div style="display:grid;grid-template-columns:180px 110px 100px 100px 100px 100px 64px 64px 130px 34px;gap:7px;align-items:center;margin-bottom:2px;min-width:1030px">
      <div style="display:flex;align-items:center;gap:6px">
        <input type="color" class="catColor" data-cat="${c.id}" value="${c.color}" style="width:28px;height:28px;padding:2px;border-radius:6px;cursor:pointer"/>
        <input type="text" class="catName" data-cat="${c.id}" value="${c.name.replace(/"/g,'&quot;')}"/>
      </div>
      <input type="text" inputmode="numeric" class="catBase moneyInput" data-cat="${c.id}" value="${fmtIN(c.base)}"/>
      <input type="text" inputmode="numeric" class="catInc moneyInput" data-cat="${c.id}" value="${fmtIN(c.inc)}"/>
      <input type="text" inputmode="numeric" class="catMatch moneyInput" data-cat="${c.id}" value="${fmtIN(c.matchThr||0)}" placeholder="0 = off"/>
      <input type="text" inputmode="numeric" class="catMaxBid moneyInput" data-cat="${c.id}" value="${fmtIN(c.maxBid||0)}" placeholder="0 = no cap" title="Teams cannot bid above this amount"/>
      <input type="text" inputmode="numeric" class="catUnsold moneyInput" data-cat="${c.id}" value="${fmtIN(c.unsoldPrice||0)}" placeholder="auto" title="Price at which an unsold player re-enters the pool (0 = auto: 2× base for marquee, base otherwise)"/>
      <input type="number" class="catMin" data-cat="${c.id}" value="${c.min||0}"/>
      <input type="number" class="catLimit" data-cat="${c.id}" value="${c.limit}"/>
      <select class="catOwner" data-cat="${c.id}" title="How this category's owner is priced" style="padding:7px 6px;font-size:12px">
        ${[["mq","Category avg"],["2x","2× base"],["1.5x","1.5× base"],["base","Base (1×)"],["custom","Custom"]].map(o=>`<option value="${o[0]}" ${((c.ownerRule||(c.isMarquee?"mq":"2x"))===o[0])?"selected":""}>${o[1]}</option>`).join("")}
      </select>
      <button class="btn btn-red btn-xs delCat" data-cat="${c.id}" title="Delete">✕</button>
    </div>
    <div style="font-size:12px;margin:-2px 0 9px;padding-left:2px;color:var(--dim);line-height:1.5">
      ${catGender(c)==="F"?"♀ women":catGender(c)==="M"?"♂ men":"mixed"} · <b style="color:var(--text)">${total}</b> in pool ·
      min <b style="color:var(--text)">${c.min||0}</b>/team, max <b style="color:var(--text)">${c.limit}</b>/team ·
      ${note}
      <span style="color:var(--dim)"> (across ${T} teams: needs ${need}, holds up to ${cap})</span>
    </div>`;
    }).join("")}
    </div>
    <button class="btn btn-gold" id="saveCat" style="margin-top:10px">Save Categories</button>
    <div style="font-size:13px;color:var(--dim);margin-top:8px">Tip: "Min/Team" reserves budget so a team can always fill that category. "Max/Team" caps how many a team may buy.</div>
  </div>

  <div class="card" style="padding:18px;max-width:680px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-weight:700">Sports in this Auction</div>
      <button class="btn btn-gold btn-sm" id="addSport">+ Add Sport</button>
    </div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:10px">Tick the sports included in this auction. Only ticked sports show on player cards and skill ratings.</div>
    <div style="display:flex;flex-direction:column;gap:7px">
      ${S.sports.map((s,i)=>`<div style="display:flex;align-items:center;gap:10px">
        <input type="checkbox" class="spOn" data-i="${i}" ${s.on?"checked":""} style="width:auto"/>
        <input type="color" class="spColor" data-i="${i}" value="${s.color}" style="width:28px;height:28px;padding:2px;border-radius:6px;cursor:pointer"/>
        <input type="text" class="spName" data-i="${i}" value="${s.name.replace(/"/g,'&quot;')}" style="flex:1"/>
        <button class="btn btn-red btn-xs delSport" data-i="${i}">✕</button>
      </div>`).join("")}
    </div>
    <button class="btn btn-gold" id="saveSports" style="margin-top:12px">Save Sports</button>
  </div>

  <div class="card" style="padding:18px;max-width:620px;margin-bottom:16px;border-color:#33457a">
    <div style="font-weight:700;margin-bottom:6px">📥 Import Players (for a new auction)</div>
    <div style="font-size:14px;color:var(--dim);margin-bottom:12px">Upload an Excel/CSV with columns <b>Name</b>, <b>Gender</b>, <b>Category</b> (+ optional skill columns matching your sports). This <b>replaces</b> the player pool — teams & settings are kept.</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <label class="btn btn-blue btn-sm" style="cursor:pointer;display:inline-flex">📁 Choose Excel / CSV<input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none"/></label>
      <button class="btn btn-ghost btn-sm" id="dlTemplate">⬇ Download Template</button>
    </div>
  </div>

  <div class="card" style="padding:18px;max-width:920px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-weight:700">Sponsor Logos — shown on the Presenter / projector screen</div>
      <label class="btn btn-gold btn-sm" style="cursor:pointer;display:inline-flex">+ Add Sponsor<input type="file" accept="image/*" id="sponsorFile" style="display:none"/></label>
    </div>
    <div style="font-size:14px;color:var(--dim);margin-bottom:12px">Upload sponsor logos; they appear in a sponsor bar at the bottom of the Presenter screen.</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px">
      ${(S.sponsors||[]).length?(S.sponsors||[]).map((sp,i)=>`<div style="position:relative;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:6px;width:130px">
        <img src="${sp.logo}" style="height:42px;max-width:110px;object-fit:contain"/>
        <input type="text" class="sponsorName" data-i="${i}" value="${(sp.name||'').replace(/"/g,'&quot;')}" placeholder="Sponsor name" style="font-size:13px;text-align:center"/>
        <button class="btn btn-red btn-xs sponsorDel" data-i="${i}" style="position:absolute;top:4px;right:4px;width:18px;height:18px;padding:0">✕</button>
      </div>`).join(""):'<div style="color:var(--dim);font-size:14px">No sponsors yet.</div>'}
    </div>
  </div>

  <div class="card" style="padding:18px;max-width:520px;margin-bottom:16px">
    <div style="font-weight:700;margin-bottom:6px">Reusable Template</div>
    <div style="font-size:14px;color:var(--dim);margin-bottom:12px">Save this auction's full configuration (rules, squad, categories & sports) as a template you can pick when creating a new auction next time.</div>
    <button class="btn btn-gold btn-sm" id="saveSetupTemplate">💾 Save Current Setup as Template</button>
  </div>

  <div class="card" style="padding:18px;max-width:520px;border-color:#5a2440">
    <div style="font-weight:700;margin-bottom:6px;color:var(--red)">Danger Zone</div>
    <div style="font-size:14px;color:var(--dim);margin-bottom:12px">Reset results returns all players to pool (keeps teams & categories). Full reset reloads original data.</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-red" id="resetAuction">↺ Reset Results</button>
      <button class="btn btn-red" id="resetAll">⚠ Full Reset</button>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════
   PRESENTER MODE
════════════════════════════════════════════ */
function renderPresenter(){
  const cur=S.current,p=cur?player(cur.playerId):null;
  let center;
  if(p){
    const cat=catById(p.cat);
    const timerRing=S.cfg.timerEnabled?`<div style="display:flex;justify-content:center;margin-top:18px"><div id="presTimerRing" style="width:90px;height:90px;border-radius:50%;background:conic-gradient(${timerColor()} ${(S.cfg.timerDuration?TIMER.remaining/S.cfg.timerDuration:0)*360}deg,#ffffff15 0deg);display:flex;align-items:center;justify-content:center"><div style="width:74px;height:74px;border-radius:50%;background:#04060f;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:30px;font-weight:900;color:${timerColor()}" id="presTimer">${TIMER.remaining}</div></div></div>`:"";
    center=`<div class="pres-player">
      <div class="pres-avatar" ${p.photo?`style="background:url(${p.photo}) center/cover;color:transparent"`:""}>${p.photo?"":p.name.charAt(0)}</div>
      <div class="pres-cat" style="color:${cat.color};background:${cat.color}1f">${cat.name}${p.secondPass?` · 🔁 2nd Pass — base ${money(baseFor(p))}`:(isLastMarquee(p)?` · 👑 Last in pool — 2× base ${money(baseFor(p))}`:"")}</div>
      <div class="pres-name">${p.name}</div>
      <div class="pres-gender">${p.gender==="F"?"♀ Female":"♂ Male"}${p.city?" · "+p.city:""}</div>
      <div class="pres-sports">${playerSports(p).map(s=>`<span class="chip ${sportClass(s)}">${s} ${p.skills[s]}</span>`).join("")}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 40px;max-width:440px;margin:14px auto 0">${sportsOn().map(s=>{const lv=p.skills[s]||0;const col=lv>=4?"#a3e635":lv>=3?"#fbbf24":lv>=2?"#fb923c":"#566a86";return `<div style="display:flex;justify-content:space-between;gap:16px;padding:2px 6px"><span style="color:#8899b4;font-size:17px">${s.replace("Table Tennis","T.Tennis")}</span><span style="font-weight:800;font-size:17px;color:${col}">${lv||'–'}</span></div>`;}).join("")}</div>
      ${(()=>{ if(!cur.matcher||!cur.leadTeam)return "";
        const tchip=(tid)=>{const tt=team(tid);return `<span style="display:inline-flex;align-items:center;gap:8px;background:${tt.color}22;border:2px solid ${tt.color};border-radius:14px;padding:8px 20px"><span style="width:14px;height:14px;border-radius:50%;background:${tt.color}"></span><span style="font-size:30px;font-weight:800;color:#fff">${tt.name}</span></span>`;};
        return `<div style="margin:12px auto 0;max-width:820px;background:linear-gradient(135deg,#fb923c33,#e8c05022);border:2px solid #fb923c;border-radius:16px;padding:14px 18px;animation:matchPulse 1s ease-in-out infinite">
          <div style="font-weight:800;font-size:24px;color:#fb923c;letter-spacing:3px;margin-bottom:10px">⚔ MATCH BID — both at ${money(cur.bid)}</div>
          <div style="display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap">${tchip(cur.leadTeam)}<span style="font-size:26px;font-weight:800;color:#fb923c">VS</span>${tchip(cur.matcher)}</div>
        </div>`;})()}
      <div class="pres-bid">
        <div class="pres-bid-lbl">${cur.leadTeam?"Current Bid":"Base Price"}</div>
        <div class="pres-bid-amt">${money(cur.bid)}</div>
        ${(()=>{const mb=catById(p.cat).maxBid||0; return (mb>0&&cur.bid>=mb)?`<div style="display:inline-flex;align-items:center;gap:10px;background:#fb718526;border:2px solid #fb7185;border-radius:14px;padding:8px 22px;margin:6px 0"><span style="font-size:24px;font-weight:800;color:#fb7185;letter-spacing:2px">🔒 MAX BID REACHED</span></div>`:"";})()}
        <div class="pres-bid-team">${cur.leadTeam?(cur.matcher?`<span style="color:${team(cur.leadTeam).color}">● ${team(cur.leadTeam).name}</span> <span style="color:#fb923c;font-weight:800"> vs </span> <span style="color:${team(cur.matcher).color}">● ${team(cur.matcher).name}</span>`:`<span style="color:${team(cur.leadTeam).color}">● ${team(cur.leadTeam).name}</span>`):'<span style="color:#ffffff55">Awaiting bids…</span>'}</div>
      </div>
      ${timerRing}
    </div>`;
  } else {
    center=`<div class="pres-empty"><div class="big">🏆</div><div style="font-size:30px;font-weight:800;color:#ffffff77">${(activeAuction().name||"PLAYER AUCTION").toUpperCase()}</div><div style="font-size:20px">Player Auction</div></div>`;
  }
  const teams=S.teams.map(t=>{
    const left=teamPurseLeft(t.id),n=teamRoster(t.id).length;
    return `<div class="pres-team ${cur&&cur.leadTeam===t.id?'leading':''}">
      <div class="pt-top"><div class="pt-name">${t.logo?`<img src="${t.logo}" style="width:22px;height:22px;border-radius:6px;object-fit:cover">`:`<span class="pt-dot" style="background:${t.color}"></span>`}${t.name}</div><div class="pt-purse">${moneyShort(left)}</div></div>
      <div class="pt-meta">${n} players · M${teamGenderCount(t.id,"M")}/F${teamGenderCount(t.id,"F")} · 👑 ${[t.owner1,t.owner2].filter(Boolean).join(", ")||"TBD"}</div>
    </div>`;
  }).join("");
  const sponsors=(S.sponsors||[]).filter(sp=>sp.logo);
  const sponsorBar=sponsors.length?`<div style="display:flex;align-items:center;justify-content:center;gap:26px;flex-wrap:wrap;padding:12px 20px;background:#ffffff08;border-top:1px solid #ffffff14">
    <span style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#ffffff55;font-weight:700">Our Sponsors</span>
    ${sponsors.map(sp=>`<img src="${sp.logo}" title="${(sp.name||'').replace(/"/g,'&quot;')}" style="height:46px;max-width:150px;object-fit:contain"/>`).join("")}
  </div>`:"";
  $("#presenterMount").innerHTML=`<div class="presenter">
    <div class="pres-head">
      <div class="pres-logo"><div class="lg">🏆</div><div><h1>${activeAuction().name||"PLAYER AUCTION"}</h1><p>Player Auction</p></div></div>
      <button class="pres-exit" id="presExit">✕ Exit Presenter</button>
    </div>
    <div class="pres-body"><div>${center}</div><div class="pres-teams">${teams}</div></div>
    ${sponsorBar}
  </div>`;
  $("#presExit").onclick=()=>{PRESENTER=false;render();};
}

/* ════════════════════════════════════════════
   BINDINGS
════════════════════════════════════════════ */
function bindView(){
  if(S.tab==="home")bindHome();
  if(S.tab==="log")bindLog();
  if(S.tab==="planner")bindPlanner();
  if(S.tab==="auction"){
    document.querySelectorAll("[data-qcat]").forEach(b=>b.onclick=()=>{S.queueCat=b.dataset.qcat;render();});
    const np=$("#nextPlayer");if(np)np.onclick=nextPlayer;
    const ps=$("#pickSpecific");if(ps)ps.onclick=openPickModal;
    document.querySelectorAll("[data-bidteam]").forEach(el=>el.onclick=()=>placeBid(el.dataset.bidteam));
    document.querySelectorAll(".tbPlus").forEach(b=>b.onclick=(e)=>{e.stopPropagation();placeBid(b.dataset.mt);});
    document.querySelectorAll(".tbEq").forEach(b=>b.onclick=(e)=>{e.stopPropagation();matchBid(b.dataset.mt);});
    const ms=$("#markSold");if(ms)ms.onclick=markSold;
    const mu=$("#markUnsold");if(mu)mu.onclick=markUnsold;
    const ub=$("#undoBid");if(ub)ub.onclick=undoBid;
    const rb=$("#resetBid");if(rb)rb.onclick=resetCurrentBid;
    const cb=$("#customBidBtn");if(cb)cb.onclick=customBid;
    const bu=$("#bidUp");if(bu)bu.onclick=()=>nudgeBid(1);
    const bd=$("#bidDown");if(bd)bd.onclick=()=>nudgeBid(-1);
    const tp=$("#timerPause");if(tp)tp.onclick=pauseResumeTimer;
    const tr=$("#timerReset");if(tr)tr.onclick=resetTimer;
    const hp=$("#holdPlayer");if(hp)hp.onclick=holdCurrent;
    document.querySelectorAll(".reAucBtn").forEach(b=>b.onclick=()=>reAuction(b.dataset.pid));
    document.querySelectorAll(".secondPassBtn").forEach(b=>b.onclick=()=>startSecondPass(b.dataset.cat));
    document.querySelectorAll(".jumpUnsold").forEach(b=>b.onclick=()=>{S.queueCat=b.dataset.cat;render();});
    const gr=$("#gotoRules");if(gr)gr.onclick=()=>{S.tab="rules";render();};
  }
  if(S.tab==="players"){
    bindRowBtns();bindSel();updateBulkBar();
    const curFilter=()=>({s:($("#pSearch")||{}).value||"",c:($("#pCatFilter")||{}).value||"all",st:($("#pStatusFilter")||{}).value||"all"});
    const f=()=>{const pb=$("#playerBody");if(pb)pb.innerHTML=playerRows(($("#pSearch")||{}).value||"",($("#pCatFilter")||{}).value||"all",($("#pStatusFilter")||{}).value||"all");bindRowBtns();bindSel();updateBulkBar();};
    const _on=(id,ev,fn)=>{const el=$("#"+id);if(el)el[ev]=fn;};
    _on("pSearch","oninput",f);$("#pCatFilter").onchange=f;$("#pStatusFilter").onchange=f;
    $("#addPlayer").onclick=()=>openPlayerModal(null);
    $("#bulkAdd").onclick=openBulkAdd;
    // import / template / gsheet
    const pi=$("#pImport");if(pi)pi.onclick=()=>$("#pImportFile").click();
    const pif=$("#pImportFile");if(pif)pif.onchange=e=>importPlayers(e.target.files[0]);
    const pt=$("#pTemplate");if(pt)pt.onclick=downloadTemplate;
    const pg=$("#pGSheet");if(pg)pg.onclick=openGSheetModal;
    // bulk delete
    $("#delAll").onclick=()=>confirmModal("Delete ALL "+S.players.length+" players from this auction? Teams & settings are kept.",()=>{S.players=[];S.current=null;SELECTED.clear();render();toast("All players deleted");});
    $("#delByCat").onclick=openDelByCat;
    const du=$("#distUnsold");if(du)du.onclick=distributeUnsold;
    // selection
    const filteredIds=()=>S.players.filter(p=>{const {s,c,st}=curFilter();if(s&&!p.name.toLowerCase().includes(s.toLowerCase()))return false;if(c!=="all"&&p.cat!==c)return false;if(st!=="all"&&p.status!==st)return false;return true;}).map(p=>p.id);

/* parse CSV/TSV text into players (shared by file import & gsheet) */
function importFromText(text){
  const delim=text.indexOf("\t")>=0 && text.indexOf(",")<0 ? "\t" : ",";
  const rows=text.split(/\r?\n/).filter(l=>l.trim().length).map(l=>splitCsvLine(l,delim));
  if(!rows.length){toast("Empty data");return;}
  let hi=rows.findIndex(r=>r.some(c=>/name/i.test(String(c||""))));
  if(hi<0)hi=0;
  const hdr=rows[hi].map(c=>String(c||"").trim().toLowerCase());
  const col=(...names)=>{for(const n of names){const i=hdr.findIndex(h=>h.includes(n.toLowerCase()));if(i>=0)return i;}return -1;};
  const ci={name:col("member name","name"),gender:col("gender","sex"),cat:col("grade","category")};
  const sportCols={}; sportsOn().forEach(s=>sportCols[s]=col(s));
  if(ci.name<0){toast("No 'Name' column found");return;}
  const ps=v=>{if(v==null||v==="")return 0;const m=String(v).match(/\d/);return m?parseInt(m[0]):0;};
  const np=[];
  for(let r=hi+1;r<rows.length;r++){
    const row=rows[r];if(!row||!row[ci.name])continue;
    const nm=String(row[ci.name]).trim();if(!nm)continue;
    const g=ci.gender>=0&&String(row[ci.gender]||"").toLowerCase().startsWith("f")?"F":"M";
    const cat=matchCategory(ci.cat>=0?String(row[ci.cat]||"").trim():"",g);
    const skills={}; allSportNames().forEach(s=>{const ix=sportCols[s];skills[s]=(ix>=0)?ps(row[ix]):0;});
    np.push({id:"p"+Date.now()+"_"+r,name:nm,gender:g,cat,skills,status:"pool",teamId:null,price:0,isOwner:false});
  }
  if(!np.length){toast("No players parsed");return;}
  closeModal();confirmModal("Import "+np.length+" players? This REPLACES the current player pool.",()=>{S.players=np;S.current=null;SELECTED.clear();render();toast(np.length+" players imported");});
}
function splitCsvLine(line,delim){
  const out=[];let cur="",q=false;
  for(let i=0;i<line.length;i++){const ch=line[i];
    if(q){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else{ if(ch==='"')q=true; else if(ch===delim){out.push(cur);cur="";} else cur+=ch; }
  }
  out.push(cur);return out.map(c=>c.trim());
}

function logBid(action,p,tid,amount){
  if(!S.bidLog)S.bidLog=[];
  S.bidLog.push({time:Date.now(), action, playerId:p?.id, playerName:p?.name||"", cat:p?p.cat:null,
    teamId:tid||null, teamName:tid?team(tid).name:"", amount:amount||0});
}
function placeBid(tid){
  const cur=S.current;if(!cur)return;
  const p=player(cur.playerId);
  // tapping the LEADING team again raises by one increment
  if(cur.leadTeam===tid){ nudgeBid(1); return; }
  const newBid=cur.leadTeam?cur.bid+incFor(p):cur.bid;
  const chk=canTeamBid(tid,p,newBid);
  if(!chk.ok){toast(team(tid).name+": "+chk.reason);return;}
  cur.history.push({bid:cur.bid,leadTeam:cur.leadTeam});
  cur.bid=newBid;cur.leadTeam=tid;cur.matcher=null;logBid("bid",p,tid,newBid);render();resetTimer();beep(523,0.08);
}
function matchBid(tid){
  const cur=S.current;if(!cur||!cur.leadTeam||tid===cur.leadTeam)return;
  const p=player(cur.playerId);
  const mthr=catById(p.cat).matchThr||0;
  if(!(mthr>0 && cur.bid>=mthr)){toast("Match unlocks at "+money(mthr));return;}
  const chk=canTeamBid(tid,p,cur.bid);
  if(!chk.ok){toast(team(tid).name+": "+chk.reason);return;}
  cur.history.push({bid:cur.bid,leadTeam:cur.leadTeam,matcher:cur.matcher||null});
  cur.matcher=cur.leadTeam;   // previous holder now co-matches at the SAME price (shown equally)
  cur.leadTeam=tid;           // this team also at the SAME price; gets the player on SOLD
  logBid("match",p,tid,cur.bid);render();resetTimer();beep(587,0.08);
}
function matchSetBid(tid){
  const cur=S.current;if(!cur)return;
  const p=player(cur.playerId);
  const el=document.getElementById("matchCustom");
  const amt=parseMoney(el?el.value:"");
  if(!amt){toast("Type a custom amount first");return;}
  if(amt<baseFor(p)){toast("Below base price ("+money(baseFor(p))+")");return;}
  const chk=canTeamBid(tid,p,amt);
  if(!chk.ok){toast(team(tid).name+": "+chk.reason);return;}
  cur.history.push({bid:cur.bid,leadTeam:cur.leadTeam});
  cur.bid=amt;cur.leadTeam=tid;logBid("match",p,tid,amt);render();resetTimer();beep(600,0.08);
}
/* raise/lower the current bid by N increments (keeps current leading team) */
function nudgeBid(dir){
  const cur=S.current;if(!cur||!cur.leadTeam)return;
  const p=player(cur.playerId);const inc=incFor(p);
  const newBid=cur.bid+dir*inc;
  if(newBid<baseFor(p)){toast("Can't go below base price");return;}
  if(dir>0)cur.matcher=null;
  if(dir>0){
    const chk=canTeamBid(cur.leadTeam,p,newBid);
    if(!chk.ok){toast(team(cur.leadTeam).name+": "+chk.reason);return;}
  }
  cur.history.push({bid:cur.bid,leadTeam:cur.leadTeam});
  cur.bid=newBid;logBid(dir>0?"raise":"lower",p,cur.leadTeam,newBid);render();resetTimer();beep(dir>0?587:440,0.07);
}
function customBid(){
  const cur=S.current;if(!cur)return;
  const val=parseInt($("#customBidVal").value);
  if(!val||val<=0){toast("Enter a valid amount");return;}
  if(!cur.leadTeam){toast("Tap a team first to make it the leader, then set custom bid");return;}
  const p=player(cur.playerId);
  if(val<=cur.bid){toast("Custom bid must exceed current bid");return;}
  const chk=canTeamBid(cur.leadTeam,p,val);
  if(!chk.ok){toast(team(cur.leadTeam).name+": "+chk.reason);return;}
  cur.history.push({bid:cur.bid,leadTeam:cur.leadTeam});
  cur.bid=val;logBid("custom",p,cur.leadTeam,val);render();resetTimer();beep(523,0.08);
}
function undoBid(){
  const cur=S.current;if(!cur)return;
  if(!cur.history.length){cur.bid=baseFor(player(cur.playerId));cur.leadTeam=null;render();return;}
  const last=cur.history.pop();cur.bid=last.bid;cur.leadTeam=last.leadTeam;render();
}
function resetCurrentBid(){
  const cur=S.current;if(!cur)return;
  const p=player(cur.playerId);
  const act = cur.leadTeam || (cur.history&&cur.history.length);
  const doReset=()=>{ cur.bid=baseFor(p); cur.leadTeam=null; cur.matcher=null; cur.history=[]; try{resetTimer();}catch(e){} render(); toast("Bidding restarted for "+p.name); };
  if(act) confirmModal("Restart bidding for "+p.name+"? This clears the current bid and all raises for this player so the auction can begin again from the base price.", doReset);
  else doReset();
}
function markSold(){
  const cur=S.current;if(!cur||!cur.leadTeam)return;
  stopTimer();
  const p=player(cur.playerId);
  p.status="sold";p.teamId=cur.leadTeam;p.price=cur.bid;
  const cat=p.cat;
  logBid("SOLD",p,cur.leadTeam,cur.bid);
  speak("Sold to "+team(cur.leadTeam).name);
  soldOverlay(p,team(cur.leadTeam),cur.bid,false);
  S.current=null;S.queueCat=cat;save();
  setTimeout(()=>autoNext(cat),2000);
}
function markUnsold(){
  const cur=S.current;if(!cur)return;
  stopTimer();
  const p=player(cur.playerId);const cat=p.cat;
  p.status="unsold";p.teamId=null;p.price=0;
  logBid("UNSOLD",p,null,0);
  speak("Unsold");
  soldOverlay(p,null,0,true);
  S.current=null;S.queueCat=cat;save();
  setTimeout(()=>autoNext(cat),1700);
}
/* Auto-pick next RANDOM player from the SAME category (first pass = pool) */
function autoNext(cat){
  const pool=S.players.filter(p=>p.status==="pool"&&p.cat===cat);
  if(pool.length){
    const pick=pool[Math.floor(Math.random()*pool.length)];
    S.current={playerId:pick.id,bid:baseFor(pick),leadTeam:null,history:[]};
    render(); startTimer();
  } else {
    S.current=null;stopTimer();
    const unsold=S.players.filter(p=>p.status==="unsold"&&p.cat===cat);
    render();
    if(unsold.length){
      const isMq=catById(cat).isMarquee;
      toast(catById(cat).name+" first pass done — "+unsold.length+" unsold."+(isMq?" Second pass = 2× base.":"")+" Use the Unsold panel below.");
      speak(catById(cat).name+" first pass complete");
    } else {
      toast(catById(cat).name+" — all players done! Pick another category.");
    }
  }
}
/* Re-nominate a single unsold player (second pass). Marquee → 2× base. */
function reAuction(pid){
  const p=player(pid); if(!p)return;
  p.secondPass=true; p.status="pool";
  stopTimer();
  S.current={playerId:p.id,bid:baseFor(p),leadTeam:null,history:[]};
  S.queueCat=p.cat; logBid("RE-NOM",p,null,baseFor(p));
  render(); startTimer();
  toast("Second pass: "+p.name+" at "+money(baseFor(p)));
}
/* Start the full second pass for a category: mark all its unsold as secondPass and nominate one */
function startSecondPass(cat){
  const unsold=S.players.filter(p=>p.status==="unsold"&&p.cat===cat);
  if(!unsold.length){toast("No unsold players in this category");return;}
  unsold.forEach(p=>{p.secondPass=true;p.status="pool";});
  S.queueCat=cat; toast("Second pass started for "+catById(cat).name);
  autoNext(cat);
}
/* Put the current player on hold (back to pool, no sale) so you can switch category */
function holdCurrent(){
  const cur=S.current;if(!cur){toast("No player on the block");return;}
  stopTimer();
  const p=player(cur.playerId);
  logBid("HOLD",p,null,0);
  S.current=null; save(); render();
  toast(p.name+" held — pick another category or player anytime");
}
function soldOverlay(p,tm,price,unsold){
  const o=document.createElement("div");o.className="sold-overlay";
  o.innerHTML=`<div class="sold-card"><div class="sold-stamp ${unsold?'unsold':''}">${unsold?'UNSOLD':'SOLD'}</div><div class="sold-info">${p.name}</div>${unsold?'<div class="sold-sub" style="color:var(--red)">Returned to pool</div>':`<div class="sold-sub">${money(price)}</div><div class="sold-team">to <b style="color:${tm.color}">${tm.name}</b></div>`}</div>`;
  document.body.appendChild(o);
  if(!unsold)fireConfetti();
  o.onclick=()=>o.remove();
  setTimeout(()=>{if(o.parentNode)o.remove();},unsold?1600:1900);
}
function fireConfetti(){
  const colors=["#e8c050","#34d399","#60a5fa","#f472b6","#c084fc","#fb923c"];
  for(let i=0;i<60;i++){
    const c=document.createElement("div");c.className="confetti";
    c.style.left=Math.random()*100+"vw";c.style.background=colors[i%colors.length];
    c.style.borderRadius=Math.random()>.5?"50%":"2px";
    const dur=1.2+Math.random()*1.3;
    c.animate([{transform:"translateY(0) rotate(0)",opacity:1},{transform:`translateY(105vh) rotate(${720*Math.random()}deg)`,opacity:.7}],{duration:dur*1000,easing:"cubic-bezier(.3,.7,.5,1)"});
    document.body.appendChild(c);setTimeout(()=>c.remove(),dur*1000);
  }
}

/* ════════════ LOGO UPLOAD (resized to keep storage small) ════════════ */
function resizeImage(file,max,cb){
  if(!file){cb("");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(max/img.width,max/img.height,1);
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      cb(cv.toDataURL("image/jpeg",0.85));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function uploadLogo(tid,file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=160,scale=Math.min(max/img.width,max/img.height,1);
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      team(tid).logo=cv.toDataURL("image/png");
      render();toast("Logo uploaded");
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ════════════ OWNER PRICING — TWO OWNERS ════════════ */
function expectedRuleFor(p){
  if(!p) return "base";
  const c=catById(p.cat);
  if(c.isMarquee) return "mq";
  if(/general a|gen a|\ba\b/i.test(c.name)) return "2x";
  if(/general b|gen b|\bb\b/i.test(c.name)) return "1.5x";
  return "base";
}
function ruleLabel(r){return {mq:"Marquee — avg of category",["2x"]:"General A — 2× base",["1.5x"]:"General B — 1.5× base",base:"Base price",custom:"Custom"}[r]||r;}
function openOwnerModal(tid){
  const t=team(tid);
  const opts=S.players.filter(p=>p.status!=="sold"||p.teamId===tid);
  const sel=(id,cur)=>`<select id="${id}"><option value="">— none —</option>${opts.map(p=>`<option value="${p.id}" ${cur===p.id?"selected":""}>${p.name} (${catById(p.cat).short})</option>`).join("")}</select>`;
  const ruleSel=(id,curRule)=>`<select id="${id}">
    <option value="mq" ${curRule==="mq"?"selected":""}>Marquee — avg of category</option>
    <option value="2x" ${curRule==="2x"?"selected":""}>General A — 2× base</option>
    <option value="1.5x" ${curRule==="1.5x"?"selected":""}>General B — 1.5× base</option>
    <option value="base" ${curRule==="base"?"selected":""}>Base price</option>
    <option value="custom" ${curRule==="custom"?"selected":""}>Custom</option>
  </select>`;
  const findByName=nm=>S.players.find(p=>p.name.toLowerCase()===(nm||"").toLowerCase());
  const o1=findByName(t.owner1), o2=findByName(t.owner2);
  // rule defaults: the rule that matches the player's category (auto). If no player, fall back to saved/base.
  const r1=o1?expectedRuleFor(o1):(t.ownerRule1||"base");
  const r2=o2?expectedRuleFor(o2):(t.ownerRule2||"base");
  showModal("Apply Owner Prices — "+t.name,`
    <div class="hint">Pick both owners from the player pool. The gradation rule auto-selects to match each owner's category (you can override it). Overrides that don't match a player's category are allowed but appear in the Discrepancy Report.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div>
        <div style="font-weight:700;color:var(--gold);margin-bottom:8px">👑 Owner 1</div>
        <label>Player</label>${sel("o1Player",o1?.id)}
        <label style="margin-top:8px">Rule</label>${ruleSel("o1Rule",r1)}
        <div id="o1CustomWrap" style="display:none;margin-top:8px"><label>Custom ₹</label><input type="number" id="o1Custom" value="${t.ownerCustom1||""}"/></div>
        <div style="background:var(--surface);border-radius:9px;padding:9px;margin-top:8px;text-align:center"><div style="font-size:11px;color:var(--dim);text-transform:uppercase">Category · Price</div><div id="o1Cat" style="font-size:12px;color:var(--muted)">—</div><div id="o1Amt" style="font-size:21px;font-weight:800;color:var(--gold)">—</div></div>
      </div>
      <div>
        <div style="font-weight:700;color:var(--gold);margin-bottom:8px">👑 Owner 2</div>
        <label>Player</label>${sel("o2Player",o2?.id)}
        <label style="margin-top:8px">Rule</label>${ruleSel("o2Rule",r2)}
        <div id="o2CustomWrap" style="display:none;margin-top:8px"><label>Custom ₹</label><input type="number" id="o2Custom" value="${t.ownerCustom2||""}"/></div>
        <div style="background:var(--surface);border-radius:9px;padding:9px;margin-top:8px;text-align:center"><div style="font-size:11px;color:var(--dim);text-transform:uppercase">Category · Price</div><div id="o2Cat" style="font-size:12px;color:var(--muted)">—</div><div id="o2Amt" style="font-size:21px;font-weight:800;color:var(--gold)">—</div></div>
      </div>
    </div>
    <div id="ownWarn" style="display:none;color:var(--red);font-size:14px;font-weight:600;margin-top:12px;background:#fb71850f;border:1px solid #fb718533;border-radius:8px;padding:9px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px"><button class="btn btn-ghost" id="ownCancel">Cancel</button><button class="btn btn-gold" id="ownApply">Apply & Assign</button></div>
  `);
  let touched={o1:false,o2:false}; // whether user manually changed a rule this session
  function calc(prefix){
    const pid=$("#"+prefix+"Player").value;
    if(!pid){$("#"+prefix+"Amt").textContent="—";$("#"+prefix+"Cat").textContent="—";return 0;}
    const p=player(pid);const rule=$("#"+prefix+"Rule").value;let amt=0;
    if(rule==="mq"){const sold=S.players.filter(x=>x.status==="sold"&&x.cat===p.cat&&x.price>0&&!x.isOwner);amt=sold.length?Math.round(sold.reduce((s,x)=>s+x.price,0)/sold.length):baseFor(p);}
    else if(rule==="2x")amt=baseFor(p)*2;
    else if(rule==="1.5x")amt=Math.round(baseFor(p)*1.5);
    else if(rule==="base")amt=baseFor(p);
    else amt=parseInt($("#"+prefix+"Custom").value)||0;
    $("#"+prefix+"CustomWrap").style.display=rule==="custom"?"block":"none";
    $("#"+prefix+"Cat").textContent=catById(p.cat).name;
    $("#"+prefix+"Amt").textContent=money(amt);
    checkConflict();
    return amt;
  }
  function onPlayerChange(prefix){
    // auto-pick rule to match the newly selected player's category (unless user manually overrode)
    const pid=$("#"+prefix+"Player").value;
    if(pid && !touched[prefix]){
      const exp=expectedRuleFor(player(pid));
      const rs=$("#"+prefix+"Rule"); if(rs) rs.value=exp;
    }
    calc(prefix);
  }
  function checkConflict(){
    const p1=$("#o1Player").value?player($("#o1Player").value):null;
    const p2=$("#o2Player").value?player($("#o2Player").value):null;
    let warn="";
    if(p1&&p2&&p1.id===p2.id) warn="Owner 1 and Owner 2 can't be the same player.";
    else if(p1&&p2&&p1.cat===p2.cat){
      const lim=catById(p1.cat).limit??99;
      if(lim<2) warn=`Both owners are ${catById(p1.cat).name}, but only ${lim} allowed per team. Change one owner, or change a category in the Players tab (or raise the limit in Setup).`;
    }
    // soft note: rule mismatch (allowed, but flagged)
    let mismatch=[];
    [["o1",p1],["o2",p2]].forEach(([pre,p])=>{ if(p){const exp=expectedRuleFor(p),act=$("#"+pre+"Rule").value;if(act!=="custom"&&act!==exp)mismatch.push(p.name);} });
    const w=$("#ownWarn");
    if(w){
      if(warn){w.style.display="block";w.style.color="var(--red)";w.textContent="⚠ "+warn;}
      else if(mismatch.length){w.style.display="block";w.style.color="var(--orange)";w.textContent="ⓘ Rule overridden for "+mismatch.join(" & ")+" — this will appear in the Discrepancy Report.";}
      else{w.style.display="none";}
    }
    return warn;
  }
  ["o1","o2"].forEach(pre=>{
    $("#"+pre+"Player").onchange=()=>onPlayerChange(pre);
    $("#"+pre+"Rule").onchange=()=>{touched[pre]=true;calc(pre);};
    setTimeout(()=>{const c=$("#"+pre+"Custom");if(c)c.oninput=()=>calc(pre);},40);
    calc(pre);
  });
  $("#ownCancel").onclick=closeModal;
  $("#ownApply").onclick=()=>{
    const warn=checkConflict();
    if(warn){toast(warn.length>60?"Resolve the owner conflict first":warn);return;}
    const a1=calc("o1"),a2=calc("o2");
    const p1id=$("#o1Player").value,p2id=$("#o2Player").value;
    S.players.forEach(p=>{ if(p.teamId===tid&&p.isOwner){p.isOwner=false;p.status="pool";p.teamId=null;p.price=0;} });
    t.owner1="";t.owner2="";
    [{pid:p1id,amt:a1,slot:1,rule:$("#o1Rule").value,custom:$("#o1Custom")?.value},
     {pid:p2id,amt:a2,slot:2,rule:$("#o2Rule").value,custom:$("#o2Custom")?.value}].forEach(o=>{
      if(!o.pid)return;
      const p=player(o.pid);
      p.status="sold";p.teamId=tid;p.price=o.amt;p.isOwner=true;
      if(o.slot===1){t.owner1=p.name;t.ownerRule1=o.rule;t.ownerCustom1=o.custom;}
      else{t.owner2=p.name;t.ownerRule2=o.rule;t.ownerCustom2=o.custom;}
    });
    if(teamPurseLeft(tid)<0)toast("⚠ Owners exceed purse — adjust prices");
    closeModal();render();toast("Owners updated");
  };
}

/* Assign an unsold / pool player directly to a team (committee decision). */
function distributeUnsold(){
  const extras=S.players.filter(p=>p.status==="unsold");
  if(!extras.length){toast("No unsold players to distribute");return;}
  confirmModal(`Distribute ${extras.length} unsold player(s) to teams? Priority goes to teams that still have budget (assigned at base price); if none can afford, the player is assigned free to the team with the fewest players. Squads may go above ${S.cfg.maxSquad}.`, ()=>{
    let withBudget=0, free=0;
    // process biggest base first so pricier players land where budget exists
    extras.sort((a,b)=>baseFor(b)-baseFor(a)).forEach(p=>{
      const base=baseFor(p);
      const affordable=S.teams.filter(t=>teamPurseLeft(t.id)>=base);
      let pick;
      if(affordable.length){
        affordable.sort((a,b)=>teamRoster(a.id).length-teamRoster(b.id).length || teamPurseLeft(b.id)-teamPurseLeft(a.id));
        pick=affordable[0]; p.price=base; withBudget++;
      } else {
        pick=[...S.teams].sort((a,b)=>teamRoster(a.id).length-teamRoster(b.id).length)[0];
        p.price=0; free++;
      }
      p.status="sold"; p.teamId=pick.id; p.isOwner=false; p.secondPass=false;
      logBid("distribute",p,pick.id,p.price);
    });
    save(); render();
    toast(`Distributed: ${withBudget} at base to teams with budget, ${free} free-assigned`);
  });
}
function openAssignModal(pid){
  const p=player(pid); if(!p)return;
  const cat=catById(p.cat);
  // suggest team: fewest in this category, then most purse left
  const teamOpts=S.teams.map(t=>{
    const left=teamPurseLeft(t.id), n=teamRoster(t.id).length, cc=teamCatCount(t.id,p.cat);
    return {t,left,n,cc};
  }).sort((a,b)=>a.cc-b.cc || b.left-a.left);
  const suggested=teamOpts[0]?.t.id;
  showModal("Assign "+p.name+" to a Team",`
    <div class="hint">Directly place this ${p.status} player onto a team (e.g. a leftover/surplus player once budgets are spent, or an unsold Marquee the committee reassigns). Teams are sorted by fewest in <b>${cat.name}</b>, then most purse left.</div>
    <label>Team</label>
    <select id="asTeam" style="margin-bottom:12px">${teamOpts.map(o=>`<option value="${o.t.id}" ${o.t.id===suggested?"selected":""}>${o.t.name} — ${o.n} players, ${o.cc} ${cat.short}, ${moneyShort(o.left)} left</option>`).join("")}</select>
    <label>Price</label><input type="number" id="asPrice" value="${baseFor(p)}" style="margin-bottom:8px"/>
    <div id="asWarn" style="font-size:13px;line-height:1.5;margin-bottom:12px"></div>

      <button class="btn btn-ghost" id="asCancel">Cancel</button>
      <button class="btn btn-gold" id="asSave">Assign</button>
    </div>
  `);
  const checkWarn=()=>{
    const tid=$("#asTeam").value, price=parseInt($("#asPrice").value)||0;
    const t=team(tid), left=teamPurseLeft(tid), n=teamRoster(tid).length, cc=teamCatCount(tid,p.cat);
    const w=[];
    if(price>left) w.push(`<span style="color:var(--red)">⚠ Over budget — ${t.name} has only ${money(left)} left.</span>`);
    if(n>=S.cfg.maxSquad) w.push(`<span style="color:var(--red)">⚠ ${t.name} squad already full (${S.cfg.maxSquad}).</span>`);
    if(cc>=cat.limit) w.push(`<span style="color:var(--orange)">⚠ ${t.name} already has ${cc} ${cat.short} (max ${cat.limit}).</span>`);
    const el=$("#asWarn"); if(el) el.innerHTML = w.length?w.join("<br>")+'<br><span style="color:var(--dim)">You can still assign — overrides are flagged in the Discrepancy Report.</span>':'<span style="color:var(--green)">✓ Fits this team\'s budget, squad & category limits.</span>';
  };
  setTimeout(checkWarn,20);
  $("#asTeam").onchange=checkWarn; $("#asPrice").oninput=checkWarn;
  $("#asCancel").onclick=closeModal;
  $("#asSave").onclick=()=>{
    const tid=$("#asTeam").value, price=parseInt($("#asPrice").value)||0;
    p.status="sold"; p.teamId=tid; p.price=price; p.isOwner=false;
    logBid("ASSIGN",p,tid,price);
    closeModal(); render(); toast(p.name+" assigned to "+team(tid).name);
  };
}
