      <div style="flex:1"><label>Mobile</label><input id="mMobile" value="${(p.mobile||"").replace(/"/g,'&quot;')}" placeholder="+91 …"/></div>
      <div style="flex:1"><label>Date of Birth</label><input type="date" id="mDob" value="${p.dob||""}"/></div>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:12px">
      <div style="flex:1"><label>City</label><input id="mCity" value="${(p.city||"").replace(/"/g,'&quot;')}" placeholder="Mumbai"/></div>
      <div style="flex:1"><label>Other Details</label><input id="mNotes" value="${(p.notes||"").replace(/"/g,'&quot;')}" placeholder="t-shirt size, notes…"/></div>
    </div>
    <label>Skill Ratings (0–5 per sport)</label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      ${sportsOn().map(s=>`<div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:var(--muted);width:64px">${s.replace("Table Tennis","T.Tennis")}</span><select class="mSkill" data-sport="${s}" style="flex:1">${[0,1,2,3,4,5].map(v=>`<option value="${v}" ${p.skills[s]===v?"selected":""}>${v} ${v?'· '+SKILL_LABEL[v]:''}</option>`).join("")}</select></div>`).join("")}
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      ${!isNew?'<button class="btn btn-red" id="delPlayer">Delete</button>':''}
      <button class="btn btn-ghost" id="cancelP">Cancel</button>
      <button class="btn btn-gold" id="saveP">Save</button>
    </div>
  `);
  $("#cancelP").onclick=closeModal;
  let photoData=p.photo||"";
  const pf=$("#mPhotoFile");
  if(pf)pf.onchange=e=>{const f=e.target.files[0];if(!f)return;resizeImage(f,256,d=>{photoData=d;const w=$("#mPhotoWrap");if(w){w.style.background=`url(${d}) center/cover`;w.textContent="";}});};
  const prm=$("#mPhotoRm");if(prm)prm.onclick=()=>{photoData="";const w=$("#mPhotoWrap");if(w){w.style.background="var(--card)";w.textContent="📷";}prm.style.display="none";};
  $("#saveP").onclick=()=>{
    const name=$("#mName").value.trim();if(!name){toast("Name required");return;}
    const skills={};document.querySelectorAll(".mSkill").forEach(s=>skills[s.dataset.sport]=parseInt(s.value)||0);
    const extra={photo:photoData, mobile:$("#mMobile").value.trim(), dob:$("#mDob").value, city:$("#mCity").value.trim(), notes:$("#mNotes").value.trim()};
    if(isNew)S.players.push({id:"p"+Date.now(),name,gender:$("#mGender").value,cat:$("#mCat").value,skills,status:"pool",teamId:null,price:0,isOwner:false,secondPass:false,...extra});
    else{p.name=name;p.gender=$("#mGender").value;p.cat=$("#mCat").value;p.skills=skills;Object.assign(p,extra);}
    closeModal();render();toast(isNew?"Player added":"Player updated");
  };
  if(!isNew)$("#delPlayer").onclick=()=>confirmModal("Delete "+p.name+"?",()=>{S.players=S.players.filter(x=>x.id!==pid);closeModal();render();toast("Deleted");});
}

/* ════════════════════════════════════════════
   ANALYTICS
════════════════════════════════════════════ */
function renderAnalytics(){
  const sold=S.players.filter(p=>p.status==="sold");
  if(!sold.length) return `<h2 class="sec">Auction Analytics</h2><div class="subtle">No players sold yet — analytics will populate as the auction runs.</div>`;
  const totalSpend=sold.reduce((s,p)=>s+p.price,0);
  const avg=Math.round(totalSpend/sold.length);
  const top=[...sold].sort((a,b)=>b.price-a.price).slice(0,8);
  const bargains=[...sold].map(p=>({p,over:p.price-baseFor(p)})).sort((a,b)=>a.over-b.over).slice(0,8);
  const catSpend=cats().map(c=>{const ps=sold.filter(p=>p.cat===c.id);return {c,n:ps.length,sum:ps.reduce((s,p)=>s+p.price,0)};}).filter(x=>x.n>0).sort((a,b)=>b.sum-a.sum);
  const maxCat=Math.max(...catSpend.map(x=>x.sum),1);
  const teamSpendArr=S.teams.map(t=>({t,sum:teamSpent(t.id),n:teamRoster(t.id).length})).sort((a,b)=>b.sum-a.sum);
  const maxTeam=Math.max(...teamSpendArr.map(x=>x.sum),1);
  const priciestTeam=teamSpendArr[0];

  return `<h2 class="sec">Auction Analytics</h2>
  <div class="subtle">Live insights — spend distribution, top buys & best value picks.</div>
  <div class="toolbar no-print">
    <button class="btn btn-green" id="xlsxAll">⬇ Excel (Full)</button>
    <button class="btn btn-ghost" id="pdfAll">🖨 PDF / Print</button>
    <button class="btn btn-ghost" id="csvAll">⬇ CSV</button>
  </div>
  <div class="stat-row">
    <div class="stat"><div class="v" style="color:var(--gold)">${moneyShort(totalSpend)}</div><div class="l">Total Spend</div></div>
    <div class="stat"><div class="v" style="color:var(--green)">${sold.length}</div><div class="l">Players Sold</div></div>
    <div class="stat"><div class="v" style="color:var(--teal)">${moneyShort(avg)}</div><div class="l">Avg Price</div></div>
    <div class="stat"><div class="v" style="color:var(--blue)">${moneyShort(top[0].price)}</div><div class="l">Top Buy</div></div>
    <div class="stat"><div class="v" style="color:var(--purple);font-size:18px">${priciestTeam.t.name}</div><div class="l">Top Spender</div></div>
  </div>

  <div class="grid" style="grid-template-columns:1fr 1fr">
    <div class="card" style="padding:16px">
      <div style="font-weight:700;margin-bottom:12px">💰 Spend by Category</div>
      ${catSpend.map(x=>`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:3px"><span style="color:${x.c.color};font-weight:600">${x.c.name} <span style="color:var(--dim)">(${x.n})</span></span><span style="font-weight:700">${moneyShort(x.sum)}</span></div><div style="height:8px;background:#ffffff10;border-radius:4px;overflow:hidden"><div style="height:100%;width:${x.sum/maxCat*100}%;background:${x.c.color};border-radius:4px"></div></div></div>`).join("")}
    </div>
    <div class="card" style="padding:16px">
      <div style="font-weight:700;margin-bottom:12px">🛡️ Spend by Team</div>
      ${teamSpendArr.map(x=>`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:3px"><span style="color:${x.t.color};font-weight:600">${x.t.name} <span style="color:var(--dim)">(${x.n})</span></span><span style="font-weight:700">${moneyShort(x.sum)}</span></div><div style="height:8px;background:#ffffff10;border-radius:4px;overflow:hidden"><div style="height:100%;width:${x.sum/maxTeam*100}%;background:${x.t.color};border-radius:4px"></div></div></div>`).join("")}
    </div>
  </div>

  <div class="grid" style="grid-template-columns:1fr 1fr;margin-top:12px">
    <div class="card" style="padding:16px">
      <div style="font-weight:700;margin-bottom:10px">🔥 Most Expensive Buys</div>
      ${top.map((p,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)"><span style="width:20px;color:var(--dim);font-weight:700">${i+1}</span><span style="flex:1;font-weight:600">${p.name}</span><span class="chip" style="background:${catById(p.cat).color}18;color:${catById(p.cat).color}">${catById(p.cat).short}</span><span style="color:${team(p.teamId).color};font-size:13px">${team(p.teamId).name}</span><span style="font-weight:800;color:var(--gold);min-width:60px;text-align:right">${moneyShort(p.price)}</span></div>`).join("")}
    </div>
    <div class="card" style="padding:16px">
      <div style="font-weight:700;margin-bottom:10px">💎 Best Value (closest to base)</div>
      ${bargains.map((b,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)"><span style="width:20px;color:var(--dim);font-weight:700">${i+1}</span><span style="flex:1;font-weight:600">${b.p.name}</span><span style="color:${team(b.p.teamId).color};font-size:13px">${team(b.p.teamId).name}</span><span style="font-weight:800;color:var(--green);min-width:60px;text-align:right">${moneyShort(b.p.price)}</span><span style="font-size:12px;color:var(--dim);min-width:48px;text-align:right">+${moneyShort(b.over)}</span></div>`).join("")}
    </div>
  </div>`;
}

/* ════════════════════════════════════════════
   HOME — AUCTIONS DASHBOARD
════════════════════════════════════════════ */
function auctionStats(a){
  const st=a.state; const sold=st.players.filter(p=>p.status==="sold");
  return { teams:st.teams.length, players:st.players.length, sold:sold.length,
    spend:sold.reduce((s,p)=>s+p.price,0), pool:st.players.filter(p=>p.status==="pool").length };
}
function renderHome(){
  const active=APP.auctions.filter(a=>a.status!=="concluded");
  const done=APP.auctions.filter(a=>a.status==="concluded");
  const card=(a)=>{
    const s=auctionStats(a); const isCur=a.id===APP.activeId;
    return `<div class="card" style="padding:16px;border-color:${isCur?'var(--gold)':'var(--line)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div><div style="font-weight:800;font-size:18px">${a.name}</div>
        <div style="font-size:12px;color:var(--dim);margin-top:2px">Created ${new Date(a.created).toLocaleDateString("en-IN")}${isCur?" · current":""}</div></div>
        <span class="status ${a.status==="concluded"?"st-unsold":"st-sold"}">${a.status==="concluded"?"done":"live"}</span>
      </div>
      <div style="display:flex;gap:8px;margin:12px 0">
        <div style="flex:1;background:var(--surface);border-radius:8px;padding:7px;text-align:center"><div style="font-weight:800;color:var(--gold)">${s.teams}</div><div style="font-size:10px;color:var(--dim);text-transform:uppercase">Teams</div></div>
        <div style="flex:1;background:var(--surface);border-radius:8px;padding:7px;text-align:center"><div style="font-weight:800;color:var(--green)">${s.sold}/${s.players}</div><div style="font-size:10px;color:var(--dim);text-transform:uppercase">Sold</div></div>
        <div style="flex:1;background:var(--surface);border-radius:8px;padding:7px;text-align:center"><div style="font-weight:800;color:var(--teal)">${moneyShort(s.spend)}</div><div style="font-size:10px;color:var(--dim);text-transform:uppercase">Spend</div></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${isCur?`<span class="btn btn-gold btn-sm" style="opacity:.6;cursor:default">● Current</span>`:`<button class="btn btn-gold btn-sm openAuc" data-id="${a.id}">Open</button>`}
        ${a.status==="concluded"?`<button class="btn btn-ghost btn-sm reopenAuc" data-id="${a.id}">Reopen</button>`:`<button class="btn btn-ghost btn-sm concludeAuc" data-id="${a.id}">Conclude</button>`}
        <button class="btn btn-ghost btn-sm dupAuc" data-id="${a.id}">Duplicate</button>
        <button class="btn btn-red btn-sm delAuc" data-id="${a.id}">Delete</button>
      </div>
    </div>`;
  };
  return `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
    <h2 class="sec" style="margin:0">Auctions</h2>
    <button class="btn btn-gold" id="createAuc">+ Create New Auction</button>
  </div>
  <div class="subtle" style="margin-top:6px">Manage multiple auctions — each keeps its own players, teams, categories & results.</div>
  <div style="font-size:13px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">Active (${active.length})</div>
  <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">${active.map(card).join("")||'<div style="color:var(--dim);font-size:15px">No active auctions.</div>'}</div>
  ${done.length?`<div style="font-size:13px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin:20px 0 8px">Recently Concluded (${done.length})</div>
  <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">${done.map(card).join("")}</div>`:""}`;
}

   CREATE AUCTION — full setup wizard

let WIZ=null;
function openCreateAuction(){
  WIZ={
    step:1,
    name:"",
    numTeams:8, purse:3000000, defaultInc:10000,
    ownersPerTeam:2, ownersArePlayers:true,
    minSquad:10, maxSquad:14, minMale:0, minFemale:0,
    timerEnabled:true, timerDuration:30, minParity:true,
    categories:DEFAULT_CATEGORIES.map(c=>({...c})),
    sports:DEFAULT_SPORTS.map(s=>({...s})),
    players:"empty"
  };
  renderWizard();
}
function wizStepsBar(){
  const labels=["Basics","Squad & Gender","Sports","Categories","Players"];
  return `<div style="display:flex;gap:4px;margin-bottom:16px">${labels.map((l,i)=>`<div style="flex:1;text-align:center"><div style="height:3px;border-radius:2px;background:${WIZ.step>=i+1?'var(--gold)':'var(--line)'};margin-bottom:4px"></div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:${WIZ.step>=i+1?'var(--gold)':'var(--dim)'}">${l}</div></div>`).join("")}</div>`;
}
function renderWizard(){
  let body="";
  if(WIZ.step===1){
    const builtins=BUILTIN_TEMPLATES, saved=(APP.templates||[]);
    const tplPicker = `<div style="margin-bottom:12px"><label>Start from a template (sports + categories pre-filled)</label>
      <div style="display:flex;gap:6px"><select id="wTemplate" style="flex:1">
        <option value="">— none (blank / default setup) —</option>
        <optgroup label="Starter templates">${builtins.map(t=>`<option value="${t.id}">${t.name}</option>`).join("")}</optgroup>
        ${saved.length?`<optgroup label="My saved templates">${saved.map(t=>`<option value="${t.id}">${t.name}</option>`).join("")}</optgroup>`:""}
      </select><button class="btn btn-red btn-sm" id="wDelTemplate">Delete</button></div>
      <div style="font-size:12px;color:var(--dim);margin-top:4px">Tip: for Cricket/Football the roles (Batsman, Bowler, Keeper… / GK, DEF, MID, FWD) are the categories — set min/max per team to enforce squad balance.</div></div>`;
    body=`
      ${tplPicker}
      <label>Auction Name</label><input id="wName" value="${(WIZ.name||"").replace(/"/g,'&quot;')}" placeholder="e.g. Odyssey Sports League 2027" style="margin-bottom:12px"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div><label>Number of Teams</label><input type="number" id="wTeams" value="${WIZ.numTeams}" min="2" max="24"/></div>
        <div><label>Purse / Team (Rs)</label><input type="number" id="wPurse" value="${WIZ.purse}"/></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div><label>Default Bid Increment</label><input type="number" id="wInc" value="${WIZ.defaultInc}"/></div>
        <div><label>Owners / Team</label><select id="wOwners"><option value="1" ${WIZ.ownersPerTeam===1?"selected":""}>1 owner</option><option value="2" ${WIZ.ownersPerTeam===2?"selected":""}>2 owners</option></select></div>
      </div>
      <label>Owners are players?</label>
      <select id="wOwnersPlayers" style="margin-bottom:12px"><option value="yes" ${WIZ.ownersArePlayers?"selected":""}>Yes - picked & priced from the pool</option><option value="no" ${!WIZ.ownersArePlayers?"selected":""}>No - names only (not in squad/budget)</option></select>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:4px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:15px;color:var(--text)"><input type="checkbox" id="wTimer" ${WIZ.timerEnabled?"checked":""} style="width:auto"/> Bid timer</label>
        <div style="max-width:120px"><label>Timer secs</label><input type="number" id="wTimerDur" value="${WIZ.timerDuration}"/></div>
      </div>`;
  }
  else if(WIZ.step===2){
    body=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div><label>Min Squad / Team</label><input type="number" id="wMin" value="${WIZ.minSquad}"/></div>
        <div><label>Max Squad / Team</label><input type="number" id="wMax" value="${WIZ.maxSquad}"/></div>
        <div><label>Min Male / Team</label><input type="number" id="wMinM" value="${WIZ.minMale}"/></div>
        <div><label>Min Female / Team</label><input type="number" id="wMinF" value="${WIZ.minFemale}"/></div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:15px;color:var(--text);margin-top:6px">
        <input type="checkbox" id="wParity" ${WIZ.minParity?"checked":""} style="width:auto"/> Min-squad parity — a team at min can't bid again until all teams reach min
      </label>
      <div class="hint" style="margin-top:14px">Set 0 for any minimum you don't want to enforce. These guard the auction: no team can overspend below its required squad, and gender minimums are flagged in the Discrepancy Report.</div>`;
  }
  else if(WIZ.step===3){
    body=`
      <div style="font-size:14px;color:var(--muted);margin-bottom:8px">Pick the sports first — these become the skill columns for players, and you can name categories around them next.</div>
      <div id="wSportRows" style="display:flex;flex-direction:column;gap:7px">${wizSportRows()}</div>
      <button class="btn btn-gold btn-sm" id="wAddSport" style="margin-top:10px">+ Add Sport</button>`;
  }
  else if(WIZ.step===4){
    const sportNames=WIZ.sports.filter(s=>s.on).map(s=>s.name).join(", ")||"—";
    body=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:14px;color:var(--muted)">Define categories. <b>Min/Max</b> = players per team.</div>
        <div style="display:flex;gap:6px"><button class="btn btn-ghost btn-xs" id="wClearCats">Clear All</button><button class="btn btn-gold btn-xs" id="wAddCat">+ Add</button></div>
      </div>
      <div class="hint" style="margin-bottom:8px">Sports in this auction: <b>${sportNames}</b>. Tick the categories to include, edit them, or <b>+ Add</b> your own. Name categories to suit the sports (e.g. "Marquee Batsman", "Bowlers").</div>
      <div style="display:grid;grid-template-columns:18px 18px 1.5fr 1fr 1fr 0.6fr 0.6fr 26px;gap:6px;align-items:center;font-size:11px;color:var(--dim);text-transform:uppercase;font-weight:700;margin-bottom:5px">
        <span>Use</span><span></span><span>Name</span><span>Base</span><span>Increment</span><span>Min</span><span>Max</span><span></span>
      </div>
      <div id="wCatRows">${wizCatRows()}</div>`;
  }
  else if(WIZ.step===5){
    const defCatsKept=WIZ.categories.some(c=>c.id==="mq_m");
    body=`
      <label>How to add players</label>
      <select id="wPlayers" style="margin-bottom:14px">
        <option value="empty" ${WIZ.players==="empty"?"selected":""}>Start empty — add via template / bulk / Google Sheet after</option>
        ${defCatsKept?`<option value="default" ${WIZ.players==="default"?"selected":""}>Load the 89 OSL sample players</option>`:""}
      </select>
      <div class="hint">After creating, go to the <b>Players</b> tab to add names — use <b>Bulk Add</b>, <b>Import Excel/CSV</b> (download a template that matches these categories & sports), or <b>Google Sheet</b>. ${!defCatsKept?"<br><br><b>Note:</b> you customised the categories, so the sample roster isn't offered — import your own list.":""}</div>
      <div class="card" style="padding:12px;margin-top:12px">
        <div style="font-weight:700;font-size:15px;margin-bottom:6px">Summary</div>
        <div style="font-size:14px;color:var(--muted);line-height:1.7">
          <b>${WIZ.name||"New Auction"}</b> · ${WIZ.numTeams} teams · ${money(WIZ.purse)}/team<br>
          Squad ${WIZ.minSquad}-${WIZ.maxSquad} · Min M${WIZ.minMale}/F${WIZ.minFemale} · ${WIZ.ownersPerTeam} owner(s)${WIZ.ownersArePlayers?" (players)":" (names)"}<br>
          ${WIZ.categories.length} categories · ${WIZ.sports.filter(s=>s.on).length} sports · parity ${WIZ.minParity?"on":"off"}
        </div>
      </div>`;
  }
  const isLast=WIZ.step===5;
  const footer=`<div style="display:flex;gap:10px;justify-content:space-between;margin-top:18px">
    <button class="btn btn-ghost" id="wCancel">Cancel</button>
    <div style="display:flex;gap:10px">
      ${isLast?`<button class="btn btn-ghost" id="wSaveTemplate">💾 Save as Template</button>`:""}
      ${WIZ.step>1?`<button class="btn btn-ghost" id="wBack">Back</button>`:""}
      ${isLast?`<button class="btn btn-gold" id="wCreate">Create Auction</button>`:`<button class="btn btn-gold" id="wNext">Next</button>`}
    </div>
  </div>`;
  showModal("Create New Auction",wizStepsBar()+body+footer);
  bindWizard();
}
function wizCatRows(){
  return WIZ.categories.map((c,i)=>`<div style="display:grid;grid-template-columns:18px 18px 1.5fr 1fr 1fr 0.6fr 0.6fr 26px;gap:6px;align-items:center;margin-bottom:6px;opacity:${c.on===false?0.45:1}">
    <input type="checkbox" class="wcOn" data-i="${i}" ${c.on!==false?"checked":""} style="width:auto;cursor:pointer" title="Include this category"/>

    <input type="text" class="wcName" data-i="${i}" value="${c.name.replace(/"/g,'&quot;')}"/>

    <input type="number" class="wcInc" data-i="${i}" value="${c.inc}"/>
    <input type="number" class="wcMin" data-i="${i}" value="${c.min||0}"/>
    <input type="number" class="wcMax" data-i="${i}" value="${c.limit}"/>

  </div>`).join("")||'<div style="color:var(--dim);font-size:14px;padding:8px">No categories — add at least one.</div>';

function wizSportRows(){

function discrepancies(){
  const issues=[];
  S.teams.forEach(t=>{
    const roster=teamRoster(t.id),n=roster.length,left=teamPurseLeft(t.id);
    if(left<0) issues.push({team:t,sev:"high",msg:`Over budget by ${money(-left)}`});
    if(n>S.cfg.maxSquad) issues.push({team:t,sev:"high",msg:`Squad ${n} exceeds max ${S.cfg.maxSquad}`});
    cats().forEach(c=>{const cnt=teamCatCount(t.id,c.id);if(cnt>c.limit)issues.push({team:t,sev:"high",msg:`${c.name}: ${cnt} exceeds max ${c.limit}`});});
    const owners=roster.filter(p=>p.isOwner);
    if(owners.length===2&&owners[0].cat===owners[1].cat&&(catById(owners[0].cat).limit??99)<2)
      issues.push({team:t,sev:"high",msg:`Both owners are ${catById(owners[0].cat).name} (limit ${catById(owners[0].cat).limit})`});
    // owner pricing rule mismatch vs category
    owners.forEach((o,i)=>{
      const slotRule = (t.owner1&&t.owner1.toLowerCase()===o.name.toLowerCase())?t.ownerRule1:t.ownerRule2;
      const exp=expectedRuleFor(o);
      if(slotRule && slotRule!=="custom" && slotRule!==exp)
        issues.push({team:t,sev:"low",msg:`Owner ${o.name} priced by "${ruleLabel(slotRule)}" but is ${catById(o.cat).name}`});
    });
    if(n>=S.cfg.minSquad){
      if(teamGenderCount(t.id,"M")<S.cfg.minMale) issues.push({team:t,sev:"low",msg:`Only ${teamGenderCount(t.id,"M")} male (min ${S.cfg.minMale})`});
      if(teamGenderCount(t.id,"F")<S.cfg.minFemale) issues.push({team:t,sev:"low",msg:`Only ${teamGenderCount(t.id,"F")} female (min ${S.cfg.minFemale})`});
    }
  });
  // GLOBAL per-category pool checks: total players vs capacity (teams×limit) and minimum requirement
  const T=S.teams.length;
  cats().forEach(c=>{
    const total=S.players.filter(p=>p.cat===c.id).length;
    const cap=T*c.limit;
    const need=T*(c.min||0);
    if(total>cap) issues.push({team:null,sev:"high",msg:`${c.name}: ${total} players but capacity is only ${cap} (${T} teams × max ${c.limit}). ${total-cap} can't be placed.`});
    else if(total<cap) issues.push({team:null,sev:"low",msg:`${c.name}: ${total} players for ${cap} slots (${T} × ${c.limit}) — ${cap-total} short of full capacity.`});
    if(total<need) issues.push({team:null,sev:"high",msg:`${c.name}: only ${total} players but ${need} required (${T} × min ${c.min}). Some teams can't meet the minimum.`});
  });
  // RULE CONSISTENCY: category minimums vs squad & gender minimums
  const sumMin=cats().reduce((s,c)=>s+(c.min||0),0);
  if(sumMin>S.cfg.maxSquad) issues.push({team:null,sev:"high",msg:`Category minimums total ${sumMin} per team, but max squad is only ${S.cfg.maxSquad}. Lower some category mins or raise max squad.`});
  else if(sumMin>S.cfg.minSquad) issues.push({team:null,sev:"low",msg:`Category minimums total ${sumMin} per team, exceeding min squad ${S.cfg.minSquad}. Each team will actually need ${sumMin}. Align them to avoid confusion.`});
  const femaleMin=cats().filter(c=>catGender(c)==="F").reduce((s,c)=>s+(c.min||0),0);
  const maleMin=cats().filter(c=>catGender(c)==="M").reduce((s,c)=>s+(c.min||0),0);
  if(S.cfg.minFemale>0 && femaleMin<S.cfg.minFemale) issues.push({team:null,sev:"low",msg:`Female category minimums total ${femaleMin}/team but Squad Rules require min ${S.cfg.minFemale} female. Increase a women's-category minimum to match.`});
  if(S.cfg.minMale>0 && maleMin<S.cfg.minMale) issues.push({team:null,sev:"low",msg:`Male category minimums total ${maleMin}/team but Squad Rules require min ${S.cfg.minMale} male. Increase a men's-category minimum to match.`});
  return issues;
}

/* Build the category slot table + budget figures for a team (the "Auction.xlsx" model) */
function teamBudget(tid){
  const t=team(tid);
  let planSize=0, baseRemaining=0, baseAll=0;
  const slots=[];
  cats().forEach(c=>{
    const won=S.players.filter(p=>p.teamId===tid&&p.cat===c.id).sort((a,b)=>b.price-a.price);
    for(let i=0;i<c.limit;i++){
      planSize++; baseAll+=c.base;
      const p=won[i]||null;
      if(!p) baseRemaining+=c.base;
      slots.push({cat:c, player:p, idx:i});
    }
  });
  const spent=teamSpent(tid);
  const balance=t.purse-spent;
  const bought=teamRoster(tid).length;
  const slotsLeft=Math.max(0,planSize-bought);
  const reserveReq=reserveNeeded(tid,null);            // base for unfilled REQUIRED (min) slots
  const freeAboveBase=balance-baseRemaining;           // money beyond base for every remaining slot
  const balanceAfterBase=freeAboveBase;                // balance once every open slot's base is preserved
  // Max you can spend on ONE more player and still buy every OTHER open slot at its base.
  // Best case: the star fills your most expensive open slot, so only the rest need base reserved.
  const openBases=slots.filter(s=>!s.player).map(s=>s.cat.base);
  const maxOpenBase=openBases.length?Math.max(...openBases):0;
  const maxSplurge=Math.max(0, balance - baseRemaining + maxOpenBase);
  return {slots, planSize, bought, slotsLeft, purse:t.purse, spent, balance,
    baseRemaining, reserveReq, freeAboveBase, balanceAfterBase, maxSplurge,
    perSlot: slotsLeft?Math.floor(balance/slotsLeft):0,
    perSlotAboveBase: slotsLeft?Math.floor(freeAboveBase/slotsLeft):0 };
}

    ? `<div class="subtle">Plan your targets and bids before auction day. Everything here saves to <b>this device only</b> — no one else can see it.${OWNER_NAME?` &middot; <b style="color:var(--gold)">${OWNER_NAME}</b>`:""} Use <b>Export</b> to back it up or send it to the organiser.</div>`
    : `<div class="subtle">Two tools: a <b>Player Shortlist</b> to plan targets before the auction, and a <b>Budget Tracker</b> that shows — slot by slot — what you've filled and how far you can still bid.</div>`;
  return `<h2 class="sec">Team Owner Planner</h2>
  ${intro}
  ${PLANNER_MODE?"":picker}${PLANNER_MODE?"":lockBar}${ioBar}${tabBar}${view}`;
}

/* ───────── BUDGET TRACKER (category slot view) ───────── */
/* ════════════════════════════════════════════
   AUCTION-DAY SQUAD ENTRY (planner)
   One action — addToSquad — drives the Budget tracker, the squad slots
   and the Sports tab, because all three read status==="sold" && teamId===tid.
════════════════════════════════════════════ */
let SQUAD_MAP={};   // datalist label -> player id (rebuilt each render)
const escAttr=s=>String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");

function addToSquad(tid,pid,price){
  const p=player(pid); if(!p){toast("Pick a player from the list.");return false;}
  const c=catById(p.cat); const b=teamBudget(tid);
  if(p.status==="sold"&&p.teamId===tid){toast(p.name+" is already in your squad.");return false;}
  const filled=teamCatCount(tid,p.cat), limit=(c.limit??99);
  if(filled>=limit){toast("Your "+c.name+" slots are full ("+filled+"/"+limit+").");return false;}
  if(price<c.base){toast("Bid can't be below the "+c.name+" base of "+money(c.base)+".");return false;}
  if(price>b.balance){toast("That's more than your balance of "+money(b.balance)+".");return false;}
  const commit=()=>{
    p.status="sold"; p.teamId=tid; p.price=price;
    if(!p.playSports||!p.playSports.length) p.playSports=getPlaySports(p);
    save(); render(); toast("✔ "+p.name+" added at "+money(price));
  };
  // Non-blocking warning: does this purchase leave enough to fill the remaining slots at base?
  const after=b.balance-price;
  const otherBase=b.slots.filter(s=>!s.player).map(s=>s.cat.base).reduce((a,x)=>a+x,0)-c.base;
  if(after<otherBase){
    confirmModal("Careful — paying "+money(price)+" leaves "+money(after)+", but your other open slots need "+money(otherBase)+" at base price. Add anyway?",commit);
    return true;
  }
  commit(); return true;
}
function removeFromSquad(tid,pid){
  const p=player(pid); if(!p)return;
  confirmModal("Remove "+p.name+" from your squad? Their bid price will be cleared.",()=>{
    p.status="pool"; p.teamId=null; p.price=0; save(); render(); toast(p.name+" removed.");
  });
}
function repriceSquad(pid,price){
  const p=player(pid); if(!p)return;
  const c=catById(p.cat);
  if(price<c.base){toast("Below the "+c.name+" base of "+money(c.base)+" — reverted.");render();return;}
  p.price=price; save(); render();
}
/* Searchable add bar. Shortlisted (★) players are listed first in the dropdown. */

    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">

function teamBidPlan(tid){ const t=team(tid); if(!t.bidPlan)t.bidPlan={}; return t.bidPlan; }
/* Pre-auction bid plan (matches Auction.xlsx): one editable row per squad slot + budget summary */
function plannerBidPlan(tid){
  const t=team(tid); const plan=teamBidPlan(tid); const short=teamPlan(tid);
  let sr=0, totalBase=0, totalPlanned=0, slotsPlanned=0, totalSlots=0, reservedBase=0;
  let rows="";
  cats().forEach(c=>{
    const favIds=Object.keys(short).filter(pid=>short[pid]&&short[pid].fav&&player(pid)&&player(pid).cat===c.id);
    const others=S.players.filter(p=>p.cat===c.id && !favIds.includes(p.id));
    if(!plan[c.id]) plan[c.id]=[];
    // Category shortlist header — lists this team's shortlisted (★) players, comma-separated, with bought markers
    const shList=favIds.length
      ? favIds.map(pid=>{const pp=player(pid);const mine=pp.status==="sold"&&pp.teamId===tid;const gone=pp.status==="sold"&&pp.teamId!==tid;
          const st=mine?"color:var(--green);font-weight:700":gone?"color:var(--dim);text-decoration:line-through":"color:var(--muted)";
          const tag=mine?` <span style="font-size:10px;background:var(--green)22;color:var(--green);padding:1px 6px;border-radius:8px;font-weight:800">BOUGHT ${moneyShort(pp.price)}</span>`:gone?' <span style="font-size:10px;color:var(--dim)">(sold elsewhere)</span>':` <button class="sqQuick btn btn-ghost btn-xs" data-pid="${pp.id}" title="I won ${escAttr(pp.name)} — add to my squad">＋</button>`;
          return `<span style="${st}">${pp.name}</span>${tag}`;}).join('<span style="color:var(--dim)">, </span>')
      : '<span style="color:var(--dim)">— none shortlisted yet (star players in the Shortlist tab) —</span>';
    rows+=`<tr style="background:var(--surface)"><td colspan="5" style="padding:8px 12px"><span class="chip" style="background:${c.color}18;color:${c.color};font-size:11px;margin-right:8px">${c.name}</span><span style="font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px">Shortlist:</span> ${shList}</td></tr>`;
    for(let i=0;i<c.limit;i++){
      sr++; totalSlots++; totalBase+=c.base;
      const e=plan[c.id][i]||{price:0,pid:""};
      const price=e.price||0; if(price>0){totalPlanned+=price;slotsPlanned++;} else reservedBase+=c.base;
      const opts=`<option value="">— shortlist —</option>`+
        (favIds.length?`<optgroup label="★ My targets">${favIds.map(pid=>`<option value="${pid}" ${e.pid===pid?"selected":""}>${player(pid).name}${player(pid).status==="sold"?" (SOLD)":""}</option>`).join("")}</optgroup>`:"")+
        `<optgroup label="All ${c.short}">${others.map(p=>`<option value="${p.id}" ${e.pid===p.id?"selected":""}>${p.name}${p.status==="sold"?" (SOLD)":""}</option>`).join("")}</optgroup>`;
      rows+=`<tr>
        <td style="color:var(--dim)">${sr}</td>
        <td><span class="chip" style="background:${c.color}18;color:${c.color}">${c.name}</span></td>
        <td style="text-align:right;color:var(--muted)">${money(c.base)}</td>
        <td><input type="text" inputmode="numeric" class="moneyLive bpPrice" data-cat="${c.id}" data-i="${i}" value="${price?fmtIN(price):''}" placeholder="0" style="width:120px;text-align:right;${price>0&&price<c.base?'border-color:var(--red);color:var(--red);background:#fb71850f':''}"/>${price>0&&price<c.base?`<div style="font-size:10px;color:var(--red);margin-top:2px">below base ${money(c.base)}</div>`:""}</td>
        <td><select class="bpPlayer" data-cat="${c.id}" data-i="${i}" style="min-width:150px">${opts}</select></td>
      </tr>`;
    }
  });
  const kitty=t.purse;
  const balance=kitty-totalPlanned;
  const slotsLeft=Math.max(0,totalSlots-slotsPlanned);
  const balAfterReserve=balance-reservedBase;
  const availPer=slotsLeft?Math.floor(balance/slotsLeft):0;
  const abovePer=slotsLeft?Math.floor(balAfterReserve/slotsLeft):0;
  const sumRow=(l,v,c)=>`<div style="display:flex;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--line)"><span style="color:var(--muted);font-size:14px">${l}</span><span style="font-weight:800;font-size:15px;color:${c||'var(--text)'}">${v}</span></div>`;
  return `<div class="no-print" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px"><button class="btn btn-gold btn-sm" id="planPrintTeam">🖨 Print This Plan</button><button class="btn btn-ghost btn-sm" id="planPrintAll">🖨 Print All Teams</button></div>
  <div class="card" style="padding:14px;margin-bottom:14px">
    <div style="font-weight:700;margin-bottom:4px">Bid Plan — plan a target price per slot</div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:10px">One row per squad slot. Type the price you plan to bid and pick a shortlisted player for it. The summary updates live so you know if your plan fits the budget.</div>
    <div class="tbl-wrap"><table><thead><tr><th>Sr</th><th>Category</th><th style="text-align:right">Base ₹</th><th>Planned Bid ₹</th><th>Shortlisted Player</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>
  <div class="card" style="padding:14px">
    <div style="font-weight:700;margin-bottom:10px">Plan Summary</div>
    <div style="display:grid;grid-template-columns:1fr;max-width:460px">
      ${sumRow("Total slots",totalSlots)}
      ${sumRow("Total base price",money(totalBase))}
      ${sumRow("Total planned bid",money(totalPlanned),"var(--gold)")}
      ${sumRow("Team Kitty",money(kitty))}
      ${sumRow("Balance (Kitty − planned)",money(balance),balance<0?"var(--red)":"var(--green)")}
      ${sumRow("Reserved balance (base of unplanned slots)",money(reservedBase))}
      ${sumRow("Balance after base-price reserve",money(balAfterReserve),balAfterReserve<0?"var(--red)":"var(--text)")}
      ${sumRow("Players planned",slotsPlanned)}
      ${sumRow("Players left",slotsLeft)}
      ${sumRow("Available to spend per player",money(availPer),"var(--teal)")}
      ${sumRow("Can bid per player above base",money(abovePer),abovePer<0?"var(--red)":"var(--teal)")}
    </div>
    ${balance<0?'<div style="color:var(--red);font-size:14px;font-weight:700;margin-top:10px">⚠ Your planned bids exceed your kitty — trim some targets.</div>':''}
  </div>`;
}

/* ───────── PLAYER SHORTLIST (pre-auction targets) ───────── */
function plannerShortlist(tid){
  const plan=teamPlan(tid);
  const catFilter=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px"><button class="shCat" data-c="all" style="${shChip(SHORT_CAT==='all')}">All</button>${cats().map(c=>`<button class="shCat" data-c="${c.id}" style="${shChip(SHORT_CAT===c.id)}">${c.short}</button>`).join("")}<button class="shCat" data-c="fav" style="${shChip(SHORT_CAT==='fav')}">★ My Targets</button></div>`;
  let list=S.players.slice();
  if(SHORT_CAT==="fav") list=list.filter(p=>plan[p.id]&&plan[p.id].fav);
  else if(SHORT_CAT!=="all") list=list.filter(p=>p.cat===SHORT_CAT);
  // sort: favourites first by priority, then by base/name
  list.sort((a,b)=>{
    const fa=plan[a.id]&&plan[a.id].fav?1:0, fb=plan[b.id]&&plan[b.id].fav?1:0;
    if(fa!==fb)return fb-fa;
    const pa=(plan[a.id]&&plan[a.id].prio)||999, pb=(plan[b.id]&&plan[b.id].prio)||999;
    if(fa&&fb&&pa!==pb)return pa-pb;
    return a.name.localeCompare(b.name);
  });
  const skillColor=v=>v>=4?"var(--green)":v>=3?"var(--gold)":v>=2?"var(--orange)":"var(--dim)";
  const ageOf=dob=>{ if(!dob)return null; const d=new Date(dob); if(isNaN(d))return null; return Math.floor((Date.now()-d.getTime())/31557600000); };
  const rows=list.map(p=>{
    const e=plan[p.id]||{}; const c=catById(p.cat);
    const status=p.status==="sold"?`<span class="chip" style="background:${team(p.teamId).color}22;color:${team(p.teamId).color};font-size:11px">SOLD ${moneyShort(p.price)} · ${team(p.teamId).name}</span>`:p.status==="unsold"?`<span class="status st-unsold" style="font-size:11px">unsold</span>`:"";
    const avatar = p.photo
      ? `<div style="width:40px;height:40px;border-radius:10px;background:url(${p.photo}) center/cover;flex-shrink:0"></div>`
      : `<div style="width:40px;height:40px;border-radius:10px;background:${c.color}22;color:${c.color};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;flex-shrink:0">${p.name.charAt(0)}</div>`;
    const skills=sportsOn().map(s=>{const v=p.skills[s]||0;return `<div style="display:flex;align-items:center;gap:4px;background:var(--surface);border-radius:7px;padding:3px 10px"><span style="font-size:14px;color:var(--muted)">${s.replace("Table Tennis","T.Tennis")}</span><span style="font-size:18px;font-weight:800;color:${skillColor(v)}">${v}</span></div>`;}).join("");
    const age=ageOf(p.dob);
    const details=[p.gender==="F"?"♀ Female":"♂ Male", age?age+" yrs":"", p.city, p.mobile, p.notes].filter(Boolean).join(" · ");
    const gTxt = p.gender==="F"?"\u2640":"\u2642";
    return `<div style="padding:9px 12px;background:${e.fav?'var(--gold)0f':'var(--card2)'};border:1px solid ${e.fav?'var(--gold2)':'var(--line)'};border-radius:11px;margin-bottom:6px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button class="shFav" data-pid="${p.id}" title="Mark as target" style="background:none;border:none;cursor:pointer;font-size:22px;color:${e.fav?'var(--gold)':'var(--dim)'};line-height:1;flex-shrink:0">${e.fav?'\u2605':'\u2606'}</button>
      ${avatar}
      <div style="min-width:168px;flex-shrink:0">
        <div style="font-weight:700;font-size:18px;line-height:1.15">${p.name} ${status}</div>
        <div style="display:flex;align-items:center;gap:7px;margin-top:3px"><span class="chip" style="background:${c.color}18;color:${c.color};font-size:13px">${c.name}</span><span style="font-size:14px;color:var(--dim)">${gTxt}${age?" \u00b7 "+age+"y":""}</span></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;flex:1;min-width:220px">${skills}</div>
      <div style="font-size:15px;color:var(--muted);font-weight:700;flex-shrink:0">${moneyShort(baseFor(p))}</div>
      ${e.fav?`<div style="display:flex;align-items:center;gap:5px;flex-shrink:0"><span style="font-size:11px;color:var(--dim);text-transform:uppercase">Prio</span><input class="shPrio" data-pid="${p.id}" type="number" min="1" value="${e.prio||""}" placeholder="#" style="width:50px;padding:5px;text-align:center;font-size:17px;font-weight:700"/></div>`:""}
    </div>`;
  }).join("")||'<div style="color:var(--dim);font-size:14px;padding:8px">No players here.</div>';
  const favCount=Object.values(plan).filter(x=>x.fav).length;
  return `<div class="card" style="padding:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px">
      <div style="font-weight:700">Shortlist & Priority</div>
      <div style="font-size:13px;color:var(--gold)">★ ${favCount} target${favCount!==1?"s":""}</div>
    </div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:10px">Tap ☆ to flag players you want, then set a priority number per category (1 = bid first). Use "★ My Targets" to see your plan and bring it to the table.</div>
    ${catFilter}
    ${rows}
  </div>`;
}
function shChip(on){ return `padding:5px 11px;border-radius:16px;border:1px solid ${on?'var(--gold)':'var(--line)'};background:${on?'var(--gold)22':'var(--card)'};color:${on?'var(--gold)':'var(--dim)'};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit`; }

/* ───────── SPORTS coverage + assignment ───────── */
function plannerSports(tid){
  const roster=teamRoster(tid);
  const cover={}; sportsOn().forEach(s=>cover[s]=0);
  roster.forEach(p=>getPlaySports(p).forEach(s=>{if(cover[s]!==undefined)cover[s]++;}));
  const coverBar=`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">${sportsOn().map(s=>`<div style="background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:7px 12px;text-align:center;min-width:74px"><div style="font-size:18px;font-weight:800;color:${cover[s]>0?sportColor(s):'var(--dim)'}">${cover[s]}</div><div style="font-size:11px;color:var(--dim)">${s}</div></div>`).join("")}</div>`;
  // Gender breakdown per sport
  const coverM={}, coverF={}; sportsOn().forEach(s=>{coverM[s]=0;coverF[s]=0;});

/* ── Owner plan export / import (name-based, portable across devices) ── */
function ownerPlanExport(){
  const tid=PLANNER_TID||S.teams[0].id; const t=team(tid);
  const plan=teamPlan(tid), bp=teamBidPlan(tid);
  const targets=Object.keys(plan).filter(pid=>plan[pid]&&plan[pid].fav&&player(pid))
    .map(pid=>({name:player(pid).name, cat:catById(player(pid).cat).name, prio:plan[pid].prio||null}));
  const bidPlan=[];
  cats().forEach(c=>{ (bp[c.id]||[]).forEach((e,i)=>{ if(e&&(e.price||e.pid)) bidPlan.push({cat:c.name, slot:i+1, planned:e.price||0, player:e.pid&&player(e.pid)?player(e.pid).name:""}); }); });
  const sports={}; S.players.forEach(p=>{ if(p.playSports&&p.playSports.length) sports[p.name]=p.playSports; });
  const squad=teamRoster(tid).map(p=>({name:p.name, cat:catById(p.cat).name, price:p.price||0}));
  const data={type:"osl-planner-export", v:1, ownerCode:OWNER_CODE, teamName:t.name, generatedAt:new Date().toISOString(), targets, bidPlan, squad, sports};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="odyssey-plan-"+(OWNER_CODE||"team")+".json"; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},120);
  toast("Plan exported — keep this file as a backup or send it to the organiser.");
}
function ownerPlanImport(file){
  if(!file)return;
  const rd=new FileReader();
  rd.onload=()=>{
    let d; try{ d=JSON.parse(rd.result); }catch(e){ toast("Couldn't read that file."); return; }
    if(!d||d.type!=="osl-planner-export"){ toast("That isn't a planner export file."); return; }
    const tid=PLANNER_TID||S.teams[0].id;
    const byName=n=>S.players.find(p=>p.name.toLowerCase()===String(n||"").toLowerCase());
    const plan=teamPlan(tid);
    (d.targets||[]).forEach(x=>{ const p=byName(x.name); if(p){ if(!plan[p.id])plan[p.id]={}; plan[p.id].fav=true; if(x.prio)plan[p.id].prio=x.prio; } });
    const bp=teamBidPlan(tid);
    (d.bidPlan||[]).forEach(x=>{ const c=cats().find(cc=>cc.name===x.cat); if(!c)return; const i=(x.slot||1)-1; if(!bp[c.id])bp[c.id]=[]; if(!bp[c.id][i])bp[c.id][i]={price:0,pid:""}; bp[c.id][i].price=x.planned||0; const pp=byName(x.player); if(pp)bp[c.id][i].pid=pp.id; });
    if(d.sports){ Object.keys(d.sports).forEach(nm=>{ const p=byName(nm); if(p)p.playSports=d.sports[nm]; }); }
    (d.squad||[]).forEach(x=>{ const p=byName(x.name); if(p&&x.price>0){ p.status="sold"; p.teamId=tid; p.price=x.price; } });
    save(); render(); toast("Plan imported "+(d.teamName?("("+d.teamName+")"):"")+".");
  };
  rd.readAsText(file);
}

/* ───────── PRINTABLE BIDDING PLAN ───────── */
function biddingPlanHTML(tid){
  const t=team(tid); const b=teamBudget(tid); const plan=teamPlan(tid); const bp=teamBidPlan(tid);
  const bpAt=(cid,i)=>{const e=(bp[cid]||[])[i]; return e||{price:0,pid:""};};
  const nameOf=pid=>{const p=pid&&player(pid); return p?p.name:"";};
  let totPlanned=0, plannedCount=0;
  cats().forEach(c=>{ for(let i=0;i<c.limit;i++){ const e=bpAt(c.id,i); if(e.price>0){totPlanned+=e.price;plannedCount++;} } });
  const slotRows=b.slots.map((sl,i)=>{
    const c=sl.cat,p=sl.player; const e=bpAt(c.id,sl.idx);
    const planned=e.price>0?e.price.toLocaleString("en-IN"):"";
    // variance: what you paid vs what you planned for that slot
    let diff="";
    if(p&&e.price>0){ const d=p.price-e.price;
      diff = d===0?"on plan":(d>0?"+"+d.toLocaleString("en-IN"):"−"+Math.abs(d).toLocaleString("en-IN")); }
    return `<tr>
    <td>${i+1}</td><td>${c.name}</td><td style="text-align:right">${c.base.toLocaleString("en-IN")}</td>
    <td style="text-align:right">${planned}</td>
    <td style="text-align:right">${p?p.price.toLocaleString("en-IN"):""}</td>
    <td style="text-align:right">${diff}</td>
    <td>${p?p.name:(nameOf(e.pid)?"<i>target: "+nameOf(e.pid)+"</i>":"")}</td></tr>`;}).join("");
  // ── dedicated Bid Plan section: only the rows the owner actually filled in ──
  let bpRows="";
  cats().forEach(c=>{
    for(let i=0;i<c.limit;i++){
      const e=bpAt(c.id,i);
      if(!(e.price>0||e.pid))continue;
      const pl=e.pid&&player(e.pid);
      const res = pl ? (pl.status==="sold" ? (pl.teamId===tid?("WON ₹"+pl.price.toLocaleString("en-IN")):"lost — sold to "+(team(pl.teamId)?team(pl.teamId).name:"another team")) : (pl.status==="unsold"?"unsold":"")) : "";
      bpRows+=`<tr><td>${c.name}</td><td>${i+1}</td><td style="text-align:right">${c.base.toLocaleString("en-IN")}</td><td style="text-align:right">${e.price>0?e.price.toLocaleString("en-IN"):""}</td><td>${pl?pl.name:""}</td><td>${res}</td></tr>`;
    }
  });
  const planKitty=b.purse;
  const bpSection = bpRows ? `<div class="pa-plan">
    <div class="pa-h2">My Bid Plan — the numbers I worked out beforehand</div>
    <table class="pa-table"><thead><tr><th>Category</th><th>Slot</th><th style="text-align:right">Base ₹</th><th style="text-align:right">Planned Bid ₹</th><th>Player I Planned For</th><th>Result</th></tr></thead><tbody>${bpRows}</tbody></table>
    <div class="pa-meta" style="margin-top:8px">Slots planned: <b>${plannedCount}</b> &middot; Total planned outlay: <b>₹${totPlanned.toLocaleString("en-IN")}</b> &middot; Kitty: ₹${planKitty.toLocaleString("en-IN")} &middot; <b>Left over if plan holds: ₹${(planKitty-totPlanned).toLocaleString("en-IN")}</b></div>
  </div>` : `<div class="pa-plan"><div class="pa-h2">My Bid Plan</div><div class="pa-meta">No planned bids entered yet — fill in the Bid Plan tab to see them here.</div></div>`;
  // targets sorted by category + priority
  const favs=S.players.filter(p=>plan[p.id]&&plan[p.id].fav).sort((a,b2)=>{
    if(a.cat!==b2.cat)return cats().findIndex(c=>c.id===a.cat)-cats().findIndex(c=>c.id===b2.cat);
    return ((plan[a.id].prio)||999)-((plan[b2.id].prio)||999);});
  const favRows=favs.map(p=>`<tr><td>${plan[p.id].prio||""}</td><td>${p.name}</td><td>${catById(p.cat).name}</td><td>${getPlaySports(p).join(", ")}</td><td>${p.status==="sold"?("WON "+p.price.toLocaleString("en-IN")):""}</td></tr>`).join("");
  return `<div class="pa-team" style="page-break-after:always">
    <h3>${t.name} — Bidding Plan${(t.owner1||t.owner2)?` · Owners: ${[t.owner1,t.owner2].filter(Boolean).join(", ")}`:""}</h3>
    <div class="pa-meta">Kitty: ₹${b.purse.toLocaleString("en-IN")} &middot; Spent: ₹${b.spent.toLocaleString("en-IN")} &middot; <b>Balance: ₹${b.balance.toLocaleString("en-IN")}</b> &middot; Bought: ${b.bought}/${b.planSize} &middot; Slots left: ${b.slotsLeft} &middot; Per-slot avg: ₹${b.perSlot.toLocaleString("en-IN")} &middot; Headroom above base: ₹${b.perSlotAboveBase.toLocaleString("en-IN")}/player</div>
    <table class="pa-table" style="margin-bottom:12px"><thead><tr><th>#</th><th>Category</th><th style="text-align:right">Base ₹</th><th style="text-align:right">Planned ₹</th><th style="text-align:right">Bid Price ₹</th><th style="text-align:right">vs Plan</th><th>Player Won</th></tr></thead><tbody>${slotRows}</tbody></table>
    ${favs.length?`<div style="font-size:14px;font-weight:700;margin:6px 0 4px;color:#0d1b4b">Target Shortlist (priority order)</div>
    <table class="pa-table"><thead><tr><th>Prio</th><th>Player</th><th>Category</th><th>Sports</th><th>Result</th></tr></thead><tbody>${favRows}</tbody></table>`:""}
    ${bpSection}
  </div>`;
}
function printBiddingPlan(tid){
  const teams = tid ? [tid] : S.teams.map(t=>t.id);
  const title = (activeAuction().name||"Auction")+" — Bidding Plan"+(tid?(" · "+team(tid).name):" (All Teams)");
  let body=`<div class="pa-h">${activeAuction().name||"Auction"} — Owner Bidding Plan${tid?(" · "+team(tid).name):""}</div>`;

  printDoc(title, body);
}

/* Robust print: writes a fully self-contained doc into a hidden iframe and prints it.
   Works inside sandboxed/embedded iframes and when hosted on your own site. */
function printDoc(title, bodyHtml){
  const css=`
    *{box-sizing:border-box}
    body{color:#111;font-family:Arial,Helvetica,sans-serif;margin:24px;background:#fff}
    .pa-h{font-size:24px;font-weight:800;border-bottom:3px solid #c8a030;padding-bottom:6px;margin-bottom:4px;color:#0d1b4b}
    .pa-sub{font-size:13px;color:#666;margin-bottom:16px}
    .pa-team{page-break-inside:auto;margin-bottom:18px;border:1px solid #ccc;border-radius:8px;padding:12px}
    .pa-team h3{font-size:17px;margin:0 0 6px;color:#0d1b4b}
    .pa-meta{font-size:14px;color:#333;margin-bottom:6px}
    .pa-table{width:100%;border-collapse:collapse;margin-top:6px}
    .pa-table th,.pa-table td{border:1px solid #ddd;padding:5px 8px;font-size:14px;text-align:left}
    .pa-table th{background:#0d1b4b;color:#fff}
    .pa-cat{background:#eef1f8;font-weight:700;color:#0d1b4b}
    /* Bid Plan starts on its own page so owners keep their pre-auction numbers */
    .pa-plan{page-break-before:always;break-before:page;margin-top:10px}
    .pa-h2{font-size:16px;font-weight:800;color:#0d1b4b;border-bottom:2px solid #c8a030;padding-bottom:4px;margin:0 0 8px}
    @page{margin:14mm}
  `;
  const docHtml=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${title}</title><style>${css}</style></head><body>${bodyHtml}</body></html>`;
  let f=document.getElementById("printFrame");
  if(f) f.remove();
  f=document.createElement("iframe");
  f.id="printFrame";
  f.style.cssText="position:fixed;right:0;bottom:0;width:0;height:0;border:0;visibility:hidden";
  document.body.appendChild(f);
  const doc=f.contentWindow.document;
  doc.open(); doc.write(docHtml); doc.close();
  const go=()=>{ try{ f.contentWindow.focus(); f.contentWindow.print(); }catch(e){ toast("Couldn't open print — try the Excel/CSV export instead"); } };
  // give the iframe a moment to lay out before printing
  if(f.contentWindow.document.readyState==="complete") setTimeout(go,200); else f.onload=()=>setTimeout(go,200);
}

/* ════════════ SAVE / LOAD AUCTION TO FILE (pause & resume) ════════════ */
function saveToFile(){
  const blob=new Blob([JSON.stringify({app:APP,version:4,saved:new Date().toISOString()},null,1)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download="OSL_Auction_"+new Date().toISOString().slice(0,16).replace(/[:T]/g,"-")+".json";a.click();URL.revokeObjectURL(url);
  toast("Auction saved to file");
}
function loadFromFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      const incoming = data.app || data; // accept either wrapped or raw APP
      if(!incoming.auctions||!incoming.auctions.length){toast("Not a valid auction file");return;}
      confirmModal("Load this saved auction file? It will replace your current auctions in this browser.",()=>{
        APP=incoming; activeAuction(); S.tab="auction"; saveApp(); render(); toast("Auction loaded");
      });
    }catch(err){toast("Load failed: "+err.message);}
  };
  reader.readAsText(file);
}

/* ════════════════════════════════════════════
   PLAYER IMPORT (Excel / CSV) — for a fresh auction
════════════════════════════════════════════ */
function importPlayers(file){
  if(!file)return;
  if(typeof XLSX==="undefined"){toast("Excel library not loaded (need internet once)");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      if(!rows.length){toast("Empty sheet");return;}
      let hi=rows.findIndex(r=>r.some(c=>/name/i.test(String(c||""))));
      if(hi<0)hi=0;
      const hdr=rows[hi].map(c=>String(c||"").trim().toLowerCase());
      const col=(...names)=>{for(const n of names){const i=hdr.findIndex(h=>h.includes(n.toLowerCase()));if(i>=0)return i;}return -1;};
      const ci={name:col("member name","name"),gender:col("gender","sex"),cat:col("grade","category")};
      // map a column for each active sport by its name
      const sportCols={};
      sportsOn().forEach(s=>{ sportCols[s]=col(s); });
      if(ci.name<0){toast("No 'Name' column found");return;}
      const parseSkill=v=>{if(v==null||v==="")return 0;const m=String(v).match(/\d/);return m?parseInt(m[0]):0;};
      const np=[];
      for(let r=hi+1;r<rows.length;r++){
        const row=rows[r];if(!row||!row[ci.name])continue;
        const nm=String(row[ci.name]).trim();if(!nm)continue;
        const g=ci.gender>=0&&String(row[ci.gender]||"").toLowerCase().startsWith("f")?"F":"M";
        const cat=matchCategory(ci.cat>=0?String(row[ci.cat]||"").trim():"",g);
        const skills={};
        allSportNames().forEach(s=>{const ix=sportCols[s];skills[s]=(ix>=0)?parseSkill(row[ix]):0;});
        np.push({id:"p"+Date.now()+"_"+r,name:nm,gender:g,cat,skills,status:"pool",teamId:null,price:0,isOwner:false});
      }
      if(!np.length){toast("No players parsed");return;}
      closeModal();confirmModal("Import "+np.length+" players? This REPLACES the current player pool (teams & settings kept).",()=>{S.players=np;S.current=null;render();toast(np.length+" players imported");});return;
    }catch(err){toast("Import failed: "+err.message);}
  };
  reader.readAsBinaryString(file);
}
function matchCategory(raw,gender){
  const r=raw.toLowerCase().trim();
  // exact match to a current category name/short/id
  for(const c of cats()){ if(r===c.name.toLowerCase()||r===c.short.toLowerCase()||r===c.id.toLowerCase())return c.id; }
  // fuzzy: contains
  for(const c of cats()){ if(r&&c.name.toLowerCase().includes(r))return c.id; }
  // heuristic keyword matching against known patterns
  const has=(...k)=>k.some(x=>r.includes(x));
  if(has("marquee")){
    if(has("women","female"))return findCat(/women.*marquee|marquee.*women/i)||findCat(/women/i)||gender==="F"&&firstCat()||firstCat();
    if(has("pickle","pb"))return findCat(/marquee.*p|p.*marquee|pickle/i)||firstMarquee();
    if(has("badminton","bm"))return findCat(/marquee.*b(?!a se)|badminton/i)||firstMarquee();
    if(has("table","tt"))return findCat(/marquee.*t|table/i)||firstMarquee();
    return findCat(/men.*marquee|marquee.*men/i)||firstMarquee();
  }
  if(has("women","female")||(gender==="F"&&has("general")))return findCat(/women.*general|general.*women/i)||lastCat();
  if(has("general a","gen a")||r==="a")return findCat(/general a/i)||lastCat();
  if(has("general b","gen b")||r==="b")return findCat(/general b/i)||lastCat();
  return gender==="F"?(findCat(/women/i)||lastCat()):lastCat();
}
const findCat=re=>{const c=cats().find(c=>re.test(c.name));return c?c.id:null;};
const firstCat=()=>cats()[0].id;
const lastCat=()=>cats()[cats().length-1].id;
const firstMarquee=()=>{const c=cats().find(c=>c.isMarquee);return c?c.id:firstCat();};

function showModal(title,html){closeModal();const bg=document.createElement("div");bg.className="modal-bg";bg.id="modalBg";bg.innerHTML=`<div class="modal"><div class="modal-h"><h3>${title}</h3><button class="x" id="modalX">×</button></div><div class="modal-b">${html}</div></div>`;document.body.appendChild(bg);bg.onclick=e=>{e.stopPropagation();};$("#modalX").onclick=closeModal;}

let toastT;function toast(msg){let t=$("#toast");if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--gold2);color:var(--text);padding:11px 20px;border-radius:12px;font-weight:600;font-size:15px;z-index:600;box-shadow:0 8px 30px #000a;transition:opacity .3s";document.body.appendChild(t);}t.textContent=msg;t.style.opacity="1";clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity="0",2200);}
function exportXlsx(){
  if(typeof XLSX==="undefined"){toast("Excel library not loaded — try again in a moment");return;}
  const sports=sportsOn();
  const wb=XLSX.utils.book_new();
  // Sheet 1: All players
  const phead=["#","Name","Gender","Category","Status","Team","Price",...sports];
  const prows=[phead];
  S.players.forEach((p,i)=>{
    const t=p.teamId?team(p.teamId):null;
    prows.push([i+1,p.name,p.gender==="F"?"Female":"Male",catById(p.cat).name,p.status,t?t.name:"",p.price||0,...sports.map(s=>p.skills[s]||0)]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(prows),"Players");
  // Sheet 2: Team rosters
  const trows=[["Team","Owner 1","Owner 2","Player","Gender","Category","Price"]];
  S.teams.forEach(t=>teamRoster(t.id).forEach(p=>trows.push([t.name,t.owner1||"",t.owner2||"",p.name,p.gender==="F"?"Female":"Male",catById(p.cat).name,p.price||0])));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(trows),"Team Rosters");
  // Sheet 3: Team summary
  const srows=[["Team","Players","Spent","Purse Left","Purse"]];
  S.teams.forEach(t=>srows.push([t.name,teamRoster(t.id).length,teamSpent(t.id),teamPurseLeft(t.id),t.purse]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(srows),"Team Summary");
  // Sheet 4: Unsold
  const urows=[["Name","Gender","Category"]];
  S.players.filter(p=>p.status==="unsold").forEach(p=>urows.push([p.name,p.gender==="F"?"Female":"Male",catById(p.cat).name]));
  if(urows.length>1) XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(urows),"Unsold");
  const nm=(activeAuction()&&activeAuction().name?activeAuction().name:"OSL").replace(/[^a-z0-9]+/gi,"_");
  XLSX.writeFile(wb,nm+"_Auction.xlsx");
  toast("Excel exported");
}
function exportCsv(){
  let rows=[["Team","Owner1","Owner2","Player","Gender","Category","TopSkills","Price"]];
  S.teams.forEach(t=>teamRoster(t.id).forEach(p=>{
    const top=sportsOn().map(s=>({s,lv:p.skills[s]})).sort((a,b)=>b.lv-a.lv).slice(0,3).filter(x=>x.lv>0).map(x=>x.s+":"+x.lv).join("|");
    rows.push([t.name,t.owner1,t.owner2,p.name,p.gender,catById(p.cat).name,top,p.price]);
  }));
  rows.push([]);rows.push(["UNSOLD"]);
  S.players.filter(p=>p.status==="unsold").forEach(p=>rows.push(["","","",p.name,p.gender,catById(p.cat).name,"",""]));
  const csv=rows.map(r=>r.map(c=>`"${(c??"").toString().replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="OSL_Auction_Results.csv";a.click();URL.revokeObjectURL(url);toast("CSV exported");
}

/* ── Live multi-window sync: operator window writes, presenter window follows ── */
let _suppressSave=false;
function reloadFromStorage(){
  if(_suppressSave)return;
  try{
    const r=localStorage.getItem(STORE_KEY); if(!r)return;
    APP=JSON.parse(r);
    if(!APP.templates)APP.templates=[];
    activeAuction();           // re-points S at the active auction's fresh state
    _suppressSave=true;        // mirror only — do NOT write back or we ping-pong forever
    render();
    _suppressSave=false;
    document.querySelectorAll(".nav button[data-tab]").forEach(b=>b.classList.toggle("active",b.dataset.tab===S.tab));
  }catch(e){ _suppressSave=false; }
}
window.addEventListener("storage", e=>{ if(e.key===STORE_KEY) reloadFromStorage(); });
document.addEventListener("focusin", e=>{ const t=e.target; if(t&&t.classList&&t.classList.contains("moneyInput")){ t.value=String(t.value).replace(/[^0-9]/g,""); } });
document.addEventListener("focusout", e=>{ const t=e.target; if(t&&t.classList&&t.classList.contains("moneyInput")){ const n=parseMoney(t.value); t.value=n?n.toLocaleString("en-IN"):""; } });
/* Live Indian-grouping mask for any .moneyLive input: user types 750000, field shows 7,50,000.
   Caret is restored by counting digits before it, so editing mid-number doesn't jump to the end. */
document.addEventListener("input", e=>{ const t=e.target;
  if(!(t&&t.classList&&t.classList.contains("moneyLive")))return;
  const before=String(t.value);
  const caret=(typeof t.selectionStart==="number")?t.selectionStart:before.length;
  const digitsBefore=(before.slice(0,caret).match(/[0-9]/g)||[]).length;
  const digits=String(before).replace(/[^0-9]/g,"").replace(/^0+(?=\d)/,"");
  const out=digits?parseInt(digits,10).toLocaleString("en-IN"):"";
  if(out!==before)t.value=out;
  if(digitsBefore===0){ try{t.setSelectionRange(0,0);}catch(err){} return; }
  let seen=0,pos=out.length;
  for(let i=0;i<out.length;i++){ if(out[i]>="0"&&out[i]<="9"){ seen++; if(seen===digitsBefore){pos=i+1;break;} } }
  try{t.setSelectionRange(pos,pos);}catch(err){}
});
let _bc=null; try{ _bc=new BroadcastChannel("osl_sync"); _bc.onmessage=()=>reloadFromStorage(); }catch(e){}
const _origSaveApp=saveApp;
saveApp=function(){ if(_suppressSave||PRESENTER)return; _origSaveApp(); try{ if(_bc)_bc.postMessage(1); }catch(e){} };

}
